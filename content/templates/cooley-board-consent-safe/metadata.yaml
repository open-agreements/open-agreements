name: Board Consent for SAFE Financing
category: corporate-governance
description: >-
  Action by unanimous written consent of the board of directors of a Delaware
  corporation approving the issuance of one or more Simple Agreements for Future
  Equity (SAFEs). Derived from the Cooley Series Seed board consent, adapted for
  SAFE financing.
source_url: https://github.com/cooleyLLP/seriesseed
version: '1.0'
license: CC0-1.0
allow_derivatives: true
attribution_text: >-
  Derived from the Cooley Series Seed Board Consent, available at
  https://github.com/cooleyLLP/seriesseed. Made available under CC0 1.0
  Universal Public Domain Dedication.
fields:
  - name: company_name
    type: string
    description: Full legal name of the company
    section: Parties
  - name: effective_date
    type: date
    description: Date the consent is effective
    section: Terms
  - name: purchase_amount
    type: string
    description: Aggregate SAFE purchase amount (e.g., "500,000")
    section: Deal Terms
  - name: board_member_1_name
    type: string
    description: Full name of the first board member
    section: Signatures
  - name: board_member_2_name
    type: string
    description: Full name of the second board member
    section: Signatures
  - name: board_member_3_name
    type: string
    description: Full name of the third board member
    section: Signatures
priority_fields:
  - company_name
  - effective_date
  - purchase_amount
  - board_member_1_name
  - board_member_2_name
  - board_member_3_name
