name: Board Consent for SAFE Financing
category: corporate-governance
description: >-
  Action by unanimous written consent of the board of directors of a Delaware
  corporation approving the issuance of one or more Simple Agreements for Future
  Equity (SAFEs). Canonically authored in Contract IR and rendered to DOCX.
source_url: https://github.com/open-agreements/open-agreements/tree/main/content/templates/cooley-board-consent-safe
version: '1.0'
license: CC-BY-4.0
allow_derivatives: true
attribution_text: >-
  Authored by OpenAgreements contributors. Drafting structure informed by the
  publicly available Cooley Series Seed SAFE board consent boilerplate.
  Licensed under CC BY 4.0.
fields:
  - name: company_name
    type: string
    description: Full legal name of the company
    section: Parties
  - name: effective_date
    type: date
    description: Date the consent is effective
    section: Terms
  - name: purchase_amount
    type: string
    description: Aggregate SAFE purchase amount (for example, "500,000")
    section: Deal Terms
  - name: board_member_1_name
    type: string
    description: Full name of the first board member
    section: Signatures
  - name: board_member_2_name
    type: string
    description: Full name of the second board member
    section: Signatures
  - name: board_member_3_name
    type: string
    description: Full name of the third board member
    section: Signatures
priority_fields:
  - company_name
  - effective_date
  - purchase_amount
  - board_member_1_name
  - board_member_2_name
  - board_member_3_name
