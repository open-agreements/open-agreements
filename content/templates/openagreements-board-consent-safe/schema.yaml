schema_id: openagreements-board-consent-safe-v1
variables:
  company_name:
    type: string
    description: Full legal name of the company
  effective_date:
    type: date
    description: Date the board consent is executed
  purchase_amount:
    type: string
    description: Aggregate SAFE purchase amount, without the dollar sign
  board_members:
    type: array
    description: Directors signing the consent
    items:
      - name: name
        type: string
        description: Full name of a director signing the consent
