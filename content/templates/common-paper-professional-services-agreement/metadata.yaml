name: Common Paper Professional Services Agreement
description: >-
  A professional services agreement with key terms, statement of work, and standard terms, based on Common Paper's
  standard form. Covers consulting and professional services engagements including deliverables, IP ownership, fees, and
  liability.
source_url: https://commonpaper.com/standards/professional-services-agreement/1.1
version: '1.1'
license: CC-BY-4.0
allow_derivatives: true
attribution_text: >-
  Based on the Common Paper Professional Services Agreement, available at https://commonpaper.com. Licensed under CC BY
  4.0. Copyright Common Paper, Inc.
fields:
  - name: company_name
    type: string
    description: Official company name
    section: Parties
  - name: provider_name
    type: string
    description: Official name of the Provider
    section: Parties
  - name: customer_name
    type: string
    description: Official name of the Customer
    section: Parties
  - name: key_terms_effective_date
    type: string
    description: Effective Date of Key Terms
    section: Terms
  - name: custom_effective_date
    type: string
    description: Custom effective date
    section: Terms
  - name: custom_sow_date
    type: string
    description: Custom SOW date
    section: Terms
  - name: sow_number
    type: string
    description: Statement of Work number
    section: Terms
  - name: term_duration_unit
    type: string
    description: Duration unit for term
    section: Terms
  - name: custom_end_date
    type: string
    description: Custom end date
    section: Terms
  - name: payment_terms
    type: string
    description: Payment terms
    section: Payment
  - name: invoice_frequency_unit
    type: string
    description: Invoice frequency unit
    section: Payment
  - name: services_description
    type: string
    description: Description of the Services to be performed, including key individuals, timeline, and milestones
    section: Terms
  - name: provider_covered_claims_detail
    type: string
    description: Detail of Provider Covered Claims covering IP infringement, employee misclassification, and gross negligence
    section: Liability
  - name: customer_covered_claims_detail
    type: string
    description: Detail of Customer Covered Claims covering IP infringement and gross negligence
    section: Liability
  - name: dpa_description
    type: string
    description: Description of or reference to the Data Processing Agreement
    section: Privacy
  - name: term_duration_value
    type: string
    description: Numeric duration for the SOW term (e.g. "6", "12")
    section: Terms
  - name: rejection_period_value
    type: string
    description: Number of time units for the deliverable rejection period
    section: Deliverables
  - name: resubmission_period_value
    type: string
    description: Number of time units for the deliverable resubmission period
    section: Deliverables
  - name: sow_changes_to_standard_terms
    type: string
    description: Changes to the Standard Terms that apply only to this SOW
    section: Terms
  - name: changes_to_standard_terms
    type: string
    description: Changes to the Standard Terms that apply to the Agreement and all SOWs
    section: Terms
  - name: fee_description
    type: string
    description: Description of fees including hourly, project, or milestone-based rates and pass-through charges
    section: Payment
  - name: invoice_cadence
    type: string
    description: Cadence for sending invoices (e.g. monthly, quarterly, upon acceptance, after each milestone)
    section: Payment
  - name: customer_obligations
    type: string
    description: Customer obligations such as identifying a point of contact or geographic limitations
    section: Terms
  - name: increased_claim_other_detail
    type: string
    description: Description of a custom Increased Claim category
    section: Liability
  - name: unlimited_claim_other_detail
    type: string
    description: Description of a custom Unlimited Claim category
    section: Liability
  - name: additional_warranty_provider_detail
    type: string
    description: Additional warranty text provided by the Provider
    section: Terms
  - name: additional_warranty_customer_detail
    type: string
    description: Additional warranty text provided by the Customer
    section: Terms
  - name: other_security_certification
    type: string
    description: Name of additional security certification (e.g. "ISO 27701")
    section: Security
  - name: payment_terms_days
    type: string
    description: Days to pay after invoice
    section: Payment
  - name: non_renewal_notice_days
    type: string
    description: Non-renewal notice days
    section: Terms
  - name: general_cap_amount
    type: string
    description: General liability cap
    section: Liability
  - name: cap_multiplier
    type: string
    description: Cap multiplier
    section: Liability
  - name: increased_cap_amount
    type: string
    description: Increased cap amount
    section: Liability
  - name: greater_of_dollar
    type: string
    description: Greater-of dollar amount
    section: Liability
  - name: include_in_progress_deliverables
    type: boolean
    description: >-
      Set to true when in-progress work should be included as Deliverables
      in addition to completed projects.
    section: Deliverables
  - name: deliverables_meet_specs
    type: boolean
    description: >-
      Set to true when Deliverables must meet attached specifications.
    section: Deliverables
  - name: deliverables_acceptance_process
    type: boolean
    description: >-
      Set to true when Deliverables are subject to an acceptance process
      before being considered final.
    section: Deliverables
  - name: ownership_upon_payment
    type: boolean
    description: >-
      Set to true when Customer owns Deliverables only upon full payment
      (not as they are created).
    section: Deliverables
  - name: no_third_party_materials
    type: boolean
    description: >-
      Set to true when no Third-Party Materials will be incorporated
      into Deliverables.
    section: Deliverables
  - name: has_third_party_materials
    type: boolean
    description: >-
      Set to true when Third-Party Materials will be incorporated
      into Deliverables.
    section: Deliverables
  - name: provider_procures_materials
    type: boolean
    description: >-
      Set to true when Provider is responsible for procuring required
      Third-Party Materials.
    section: Deliverables
  - name: customer_procures_materials
    type: boolean
    description: >-
      Set to true when Customer is responsible for procuring required
      Third-Party Materials.
    section: Deliverables
  - name: additional_terms_by_provider
    type: boolean
    description: >-
      Set to true when Provider is adding additional terms to the agreement.
      Specify terms in additional_warranty_provider_detail.
    section: Terms
  - name: additional_terms_by_customer
    type: boolean
    description: >-
      Set to true when Customer is adding additional terms to the agreement.
      Specify terms in additional_warranty_customer_detail.
    section: Terms
  - name: has_security_policy
    type: boolean
    description: >-
      Set to true when Provider has a Security Policy available at the
      specified DPA reference URL.
    section: Security
  - name: has_security_certifications
    type: boolean
    description: >-
      Set to true when Provider maintains annually updated security
      reports or certifications.
    section: Security
  - name: cert_iso_27001
    type: boolean
    description: Set to true when Provider holds ISO 27001 certification.
    section: Security
  - name: cert_penetration_testing
    type: boolean
    description: Set to true when Provider performs regular penetration testing.
    section: Security
  - name: cert_soc2_type1
    type: boolean
    description: Set to true when Provider holds SOC 2 Type I certification.
    section: Security
  - name: cert_pci_level1
    type: boolean
    description: Set to true when Provider holds PCI Level 1 certification.
    section: Security
  - name: cert_soc2_type2
    type: boolean
    description: Set to true when Provider holds SOC 2 Type II certification.
    section: Security
  - name: cert_pci_level2
    type: boolean
    description: Set to true when Provider holds PCI Level 2 certification.
    section: Security
  - name: cert_hitrust
    type: boolean
    description: Set to true when Provider holds HITRUST certification.
    section: Security
  - name: cert_fedramp
    type: boolean
    description: Set to true when Provider holds FedRAMP Authorization.
    section: Security
  - name: cert_other
    type: boolean
    description: >-
      Set to true to include an additional security certification.
      Specify the certification in other_security_certification.
    section: Security
  - name: provider_may_use_logo
    type: boolean
    description: >-
      Set to true when Provider may publicly identify Customer and use
      Customer's logo and trademarks in promotional materials.
    section: Publicity
  - name: provider_may_identify_nonpublic
    type: boolean
    description: >-
      Set to true when Provider may identify Customer as a customer
      in non-public settings (e.g., sales conversations).
    section: Publicity
  - name: general_cap_type
    type: enum
    description: >-
      How the General Cap Amount (baseline liability limit) is calculated.
      "multiplier" uses a multiple of fees, "dollar" uses a fixed amount,
      "greater_of" uses the greater of a dollar amount or a multiple of fees.
    options:
      - multiplier
      - dollar
      - greater_of
    section: Liability
  - name: increased_cap_type
    type: enum
    description: >-
      How the Increased Cap Amount (higher liability limit for Increased
      Claims) is calculated. Same options as general_cap_type.
    options:
      - multiplier
      - dollar
      - greater_of
    section: Liability
  - name: increased_claim_breach_privacy
    type: boolean
    description: >-
      Set to true when breach of Section 3 (Privacy & Security) should be
      classified as an Increased Claim with a higher liability cap.
    section: Liability
  - name: increased_claim_breach_conf
    type: boolean
    description: >-
      Set to true when breach of Section 11 (Confidentiality) should be
      classified as an Increased Claim (excluding Privacy & Security breaches).
    section: Liability
  - name: increased_claim_indemnification
    type: boolean
    description: >-
      Set to true when indemnification obligations for Covered Claims should
      be classified as an Increased Claim.
    section: Liability
  - name: increased_claim_breach_privacy_gross
    type: boolean
    description: >-
      Set to true when breach of Privacy & Security resulting from gross
      negligence or willful misconduct is an Increased Claim.
    section: Liability
  - name: increased_claim_breach_conf_gross
    type: boolean
    description: >-
      Set to true when breach of Confidentiality resulting from gross
      negligence or willful misconduct is an Increased Claim.
    section: Liability
  - name: increased_claim_gross_willful
    type: boolean
    description: >-
      Set to true when claims from gross negligence or willful misconduct
      should be classified as Increased Claims.
    section: Liability
  - name: increased_claim_other
    type: boolean
    description: >-
      Set to true to include a custom Increased Claim category. Specify in
      increased_claim_other_detail.
    section: Liability
  - name: unlimited_claim_breach_privacy_gross
    type: boolean
    description: >-
      Set to true when breach of Privacy & Security resulting from gross
      negligence should have no liability cap (Unlimited Claim).
    section: Liability
  - name: unlimited_claim_breach_conf_gross
    type: boolean
    description: >-
      Set to true when breach of Confidentiality resulting from gross
      negligence should have no liability cap (Unlimited Claim).
    section: Liability
  - name: unlimited_claim_indemnification
    type: boolean
    description: >-
      Set to true when indemnification for Covered Claims should have
      no liability cap (Unlimited Claim).
    section: Liability
  - name: unlimited_claim_breach_privacy
    type: boolean
    description: >-
      Set to true when breach of Section 3 (Privacy & Security) should
      have no liability cap (Unlimited Claim).
    section: Liability
  - name: unlimited_claim_breach_conf
    type: boolean
    description: >-
      Set to true when breach of Section 11 (Confidentiality) should
      have no liability cap (Unlimited Claim).
    section: Liability
  - name: unlimited_claim_gross_willful
    type: boolean
    description: >-
      Set to true when claims from gross negligence or willful misconduct
      should have no liability cap (Unlimited Claim).
    section: Liability
  - name: unlimited_claim_other
    type: boolean
    description: >-
      Set to true to include a custom Unlimited Claim category. Specify
      in unlimited_claim_other_detail.
    section: Liability
  - name: governing_law
    type: string
    description: Governing law
    default: Delaware
    section: Legal
  - name: jurisdiction
    type: string
    description: Jurisdiction
    default: courts in New Castle County, Delaware
    section: Legal
  - name: travel_expense_policy
    type: string
    description: Travel and expense policy
    section: Payment
  - name: customer_owned_deliverables
    type: string
    description: Customer-owned deliverables
    section: Terms
  - name: support_policy_reference
    type: string
    description: Support policy reference
    section: Service
  - name: dpa_reference
    type: string
    description: DPA reference
    section: Privacy
  - name: provider_signatory_type
    type: enum
    description: Whether the Provider signatory is an entity or individual
    options:
      - entity
      - individual
    default: entity
    section: Signature Block
  - name: provider_signatory_name
    type: string
    description: Full legal name of the Provider's signatory
    section: Signature Block
  - name: provider_signatory_title
    type: string
    description: Title/role of the Provider's signatory (entity only)
    section: Signature Block
  - name: provider_signatory_company
    type: string
    description: Company name for the Provider signatory (entity only)
    section: Signature Block
  - name: provider_signatory_email
    type: string
    description: Notice email address for the Provider
    section: Signature Block
  - name: customer_signatory_type
    type: enum
    description: Whether the Customer signatory is an entity or individual
    options:
      - entity
      - individual
    default: entity
    section: Signature Block
  - name: customer_signatory_name
    type: string
    description: Full legal name of the Customer's signatory
    section: Signature Block
  - name: customer_signatory_title
    type: string
    description: Title/role of the Customer's signatory (entity only)
    section: Signature Block
  - name: customer_signatory_company
    type: string
    description: Company name for the Customer signatory (entity only)
    section: Signature Block
  - name: customer_signatory_email
    type: string
    description: Notice email address for the Customer
    section: Signature Block
priority_fields:
  - company_name
  - provider_name
  - customer_name
  - key_terms_effective_date
  - sow_number
  - payment_terms
  - governing_law
  - jurisdiction
