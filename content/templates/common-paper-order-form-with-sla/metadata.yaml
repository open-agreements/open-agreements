name: Common Paper Order Form with SLA
description: >-
  An order form template with service level agreement (SLA) provisions, based on Common Paper's standard form. Extends
  the standard order form with uptime targets, response times, and support schedules.
source_url: https://commonpaper.com/standards/cloud-service-agreement/2.1
version: '2.1'
license: CC-BY-4.0
allow_derivatives: true
attribution_text: >-
  Based on the Common Paper Order Form with SLA, available at https://commonpaper.com. Licensed under CC BY 4.0.
  Copyright Common Paper, Inc.
fields:
  - name: company_name
    type: string
    description: Company name (shown in header)
    section: Parties
  - name: provider_name
    type: string
    description: Name of the Provider
    section: Parties
  - name: customer_name
    type: string
    description: Name of the Customer
    section: Parties
  - name: key_terms_effective_date
    type: string
    description: Effective Date of the Key Terms agreement
    section: Terms
  - name: cloud_service
    type: string
    description: Description of the cloud service / product
    section: Service
  - name: custom_start_date
    type: string
    description: Custom start date (if not date of last signature)
    section: Terms
  - name: subscription_period
    type: string
    description: Length of access to the service (e.g. "12 months")
    section: Service
  - name: pilot_period
    type: string
    description: Length of pilot/trial period (e.g. "3 months")
    section: Service
  - name: fees
    type: string
    description: Subscription fee amount (e.g. "$10,000")
    section: Payment
  - name: fee_unit
    type: string
    description: Fee billing unit (e.g. "year", "month", "User")
    section: Payment
  - name: fill_in_value
    type: string
    description: General fill-in value for customizable sections
    section: Terms
  - name: payment_frequency
    type: string
    description: Payment frequency (e.g. "monthly", "quarterly", "annually")
    section: Payment
  - name: payment_terms_days
    type: string
    description: Number of days to pay after invoice
    section: Payment
  - name: payment_due_from
    type: string
    description: When payment terms start (e.g. "Customer's receipt of invoice")
    section: Payment
  - name: technical_support
    type: string
    description: Description of included support
    section: Service
  - name: professional_services_description
    type: string
    description: Description of professional services
    section: Service
  - name: professional_services_reference
    type: string
    description: Reference to SOW or PSA for professional services
    section: Service
  - name: support_start_time
    type: string
    description: Start time for support availability
    section: Service
  - name: support_end_time
    type: string
    description: End time for support availability
    section: Service
  - name: support_days
    type: string
    description: Days of the week support is available
    section: Service
  - name: support_timezone
    type: string
    description: Timezone for support hours
    section: Service
  - name: support_request_process
    type: string
    description: How customers request support or file incident tickets (e.g. email address, helpdesk URL)
    section: Service
  - name: response_time_unit
    type: string
    description: Unit for response time targets (e.g. "minutes", "hours", "days")
    section: Service
  - name: resolution_time_unit
    type: string
    description: Unit for resolution time targets (e.g. "hours", "days")
    section: Service
  - name: pilot_has_fee
    type: boolean
    description: >-
      Set to true when the Pilot Period has an associated fee
      (not a free trial).
    section: Payment
  - name: fee_is_per_unit
    type: boolean
    description: >-
      Set to true when fees are charged per unit (e.g., per user, per month).
    section: Payment
  - name: fee_is_other
    type: boolean
    description: >-
      Set to true when a custom fee structure applies. Describe in
      fill_in_value.
    section: Payment
  - name: fee_may_increase
    type: boolean
    description: >-
      Set to true when fees may increase up to a specified percentage
      upon renewal.
    section: Payment
  - name: fee_will_increase
    type: boolean
    description: >-
      Set to true when fees will automatically increase upon renewal.
    section: Payment
  - name: fee_inclusive_of_taxes
    type: boolean
    description: >-
      Set to true when fees are inclusive of taxes, modifying Section 4.1
      of the Standard Terms.
    section: Payment
  - name: payment_by_invoice
    type: boolean
    description: >-
      Set to true when payment is by invoice (not automatic payment).
    section: Payment
  - name: no_auto_renew
    type: boolean
    description: >-
      Set to true when this Order Form does not automatically renew,
      modifying Section 5.1 of the Standard Terms.
    section: Terms
  - name: has_target_uptime
    type: boolean
    description: >-
      Set to true when a Target Uptime percentage is specified in
      the SLA.
    section: Service
  - name: has_target_response_time
    type: boolean
    description: >-
      Set to true when Target Response Times are specified in the SLA.
    section: Service
  - name: professional_services_by_reference
    type: boolean
    description: >-
      Set to true when professional services are described by reference
      to an external SOW or PSA.
    section: Service
  - name: professional_services_described
    type: boolean
    description: >-
      Set to true when professional services are described inline
      in the Order Form.
    section: Service
  - name: professional_services_payment
    type: boolean
    description: >-
      Set to true when a separate payment process applies to
      professional services.
    section: Payment
  - name: provider_signatory_type
    type: enum
    description: Whether the Provider signatory is an entity or individual
    options:
      - entity
      - individual
    default: entity
    section: Signature Block
  - name: provider_signatory_name
    type: string
    description: Full legal name of the Provider's signatory
    section: Signature Block
  - name: provider_signatory_title
    type: string
    description: Title/role of the Provider's signatory (entity only)
    section: Signature Block
  - name: provider_signatory_company
    type: string
    description: Company name for the Provider signatory (entity only)
    section: Signature Block
  - name: provider_signatory_email
    type: string
    description: Notice email address for the Provider
    section: Signature Block
  - name: customer_signatory_type
    type: enum
    description: Whether the Customer signatory is an entity or individual
    options:
      - entity
      - individual
    default: entity
    section: Signature Block
  - name: customer_signatory_name
    type: string
    description: Full legal name of the Customer's signatory
    section: Signature Block
  - name: customer_signatory_title
    type: string
    description: Title/role of the Customer's signatory (entity only)
    section: Signature Block
  - name: customer_signatory_company
    type: string
    description: Company name for the Customer signatory (entity only)
    section: Signature Block
  - name: customer_signatory_email
    type: string
    description: Notice email address for the Customer
    section: Signature Block
required_fields:
  - company_name
  - provider_name
  - customer_name
  - key_terms_effective_date
  - cloud_service
  - subscription_period
