name: Stockholder Consent for SAFE Financing
category: corporate-governance
description: >-
  Action by written consent of the stockholders of a Delaware corporation
  approving the issuance of one or more Simple Agreements for Future Equity
  (SAFEs). Adapted for SAFE financing from publicly available Series Seed
  stockholder consent materials.
source_url: https://github.com/cooleyLLP/seriesseed
version: '1.0'
license: CC0-1.0
allow_derivatives: true
attribution_text: >-
  Adapted from publicly available Series Seed stockholder consent materials at
  https://github.com/cooleyLLP/seriesseed. Made available under CC0 1.0
  Universal Public Domain Dedication.
fields:
  - name: company_name
    type: string
    description: Full legal name of the company
    section: Parties
  - name: effective_date
    type: date
    description: Date the consent is effective
    section: Terms
  - name: purchase_amount
    type: string
    description: Aggregate SAFE purchase amount (e.g., "500,000")
    section: Deal Terms
  - name: stockholders
    type: array
    description: Stockholders signing the consent
    section: Signatures
    items:
      - name: name
        type: string
        description: Full name of a stockholder signing the consent
priority_fields:
  - company_name
  - effective_date
  - purchase_amount
  - stockholders
