schema_id: openagreements-stockholder-consent-safe-v1
variables:
  company_name:
    type: string
    description: Full legal name of the company
  effective_date:
    type: date
    description: Date the stockholder consent is executed
  purchase_amount:
    type: string
    description: Aggregate SAFE purchase amount, without the dollar sign
  stockholders:
    type: array
    description: Stockholders signing the consent
    items:
      - name: name
        type: string
        description: Full name of a stockholder signing the consent
