name: OpenAgreements Employee Restrictive Covenant (Wyoming)
description: >-
  Wyoming-specific employee restrictive covenant agreement with modular
  covenant matrix (non-compete, non-solicitation, non-dealing, non-investment,
  confidentiality, non-disparagement). Incorporates Wyo. Stat. section 1-23-108
  (SF 107, 2025) pathway gating for non-compete-adjacent covenants. Drafted as
  a starting point for licensed counsel review.
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-wyoming
version: '1.0'
license: CC-BY-4.0
allow_derivatives: true
attribution_text: >-
  Authored by OpenAgreements contributors. Wyoming-specific analysis informed
  by publicly available commentary from Am Law firms including Ogletree Deakins,
  Fisher Phillips, Littler Mendelson, Foley & Lardner, Faegre Drinker, and
  Vinson & Elkins. See practice note for sources. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    section: Timing
  - name: worker_category
    type: enum
    description: >-
      Employee role classification under Wyo. Stat. section 1-23-108.
      Non-compete covenants are enforceable only for executive or management
      personnel and professional staff to them.
    options:
      - executive
      - management
      - professional_staff
      - physician
      - other
    section: Role
  - name: restriction_pathways
    type: string
    description: >-
      Wyoming restriction pathway(s) that support non-compete-adjacent covenants
      under Wyo. Stat. section 1-23-108. Multiple pathways may apply. Use
      comma-separated values. Options: executive_or_management,
      trade_secret_protection, none.
    default: none
    default_value_rationale: >-
      Defaults to none because Wyo. Stat. section 1-23-108 voids most
      non-compete covenants. The drafter must affirmatively select a pathway.
    section: Pathway
  - name: consideration
    type: string
    description: >-
      What the employee receives in exchange for the restrictive covenants
      (e.g., initial employment, continued employment, equity grant, separate
      payment). For existing employees, new consideration beyond continued
      employment may be required.
    section: Consideration
  - name: competitive_business_definition
    type: string
    description: >-
      Description of the business activities that constitute competition
      with the employer (e.g., the development and sale of widget software).
    section: Covenants
  - name: protected_customers
    type: string
    description: >-
      Description of the customers, vendors, referral sources, and business
      partners covered by the non-solicitation and non-dealing covenants,
      limited to those with whom the employee had material contact.
    section: Covenants
  - name: protected_employee_group
    type: string
    description: >-
      Description of the employees covered by the employee non-solicitation
      covenant (e.g., all employees, employees in the same department,
      employees the departing employee managed or worked with).
    section: Covenants
  - name: specified_competitors
    type: string
    description: >-
      Optional named list of specific competitors. Narrowing the restriction
      to named competitors strengthens enforceability.
    default: ''
    section: Covenants
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    default: the geographic area in which Employee provided services
    default_value_rationale: >-
      Tied to the employee's actual service area rather than the employer's
      full footprint. Narrower scope improves enforceability under Wyoming's
      strict scrutiny of non-compete provisions.
    section: Covenants
  - name: passive_investment_threshold
    type: string
    description: >-
      Maximum passive ownership percentage permitted under the non-compete
      and non-investment covenants.
    default: 5% of any class of publicly traded securities
    default_value_rationale: >-
      5% passive investment carve-out is standard across Fortune 500
      restrictive covenant agreements (e.g., Compass Minerals, Old National
      Bancorp SEC filings).
    section: Covenants
  - name: return_of_property_deadline
    type: string
    description: Deadline for returning company property after termination
    default: 5 business days after termination
    section: Obligations
  - name: confidentiality_included
    type: string
    description: Whether the confidentiality covenant is included
    default: 'Yes'
    section: Covenant Matrix
  - name: confidentiality_duration
    type: string
    description: Duration of confidentiality obligations
    default: Indefinite for trade secrets; 24 months for other Confidential Information
    section: Covenant Matrix
  - name: employee_nonsolicit_included
    type: string
    description: Whether the employee non-solicitation covenant is included
    default: 'Yes'
    section: Covenant Matrix
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    default: 12 months
    default_value_rationale: >-
      12 months is the most common enforceable duration for employee
      non-solicitation covenants. Mayer Brown guidance states 1-2 years is
      the outer range of reasonableness.
    section: Covenant Matrix
  - name: customer_nonsolicit_included
    type: string
    description: Whether the customer/partner non-solicitation covenant is included
    default: 'Yes'
    section: Covenant Matrix
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    default: 12 months
    default_value_rationale: >-
      12 months is the most common enforceable duration. Compass Minerals uses
      12 months for non-CEO employees and 24 months for CEO.
    section: Covenant Matrix
  - name: nondealing_included
    type: string
    description: >-
      Whether the non-dealing covenant is included. Requires a lawful
      restriction pathway under Wyo. Stat. section 1-23-108.
    default: 'No'
    section: Covenant Matrix
  - name: nondealing_duration
    type: string
    description: Duration of non-dealing restriction
    default: 12 months
    section: Covenant Matrix
  - name: noncompete_included
    type: string
    description: >-
      Whether the non-competition covenant is included. Requires a lawful
      restriction pathway under Wyo. Stat. section 1-23-108. Defaults to No
      because most non-compete covenants are void under Wyoming law.
    default: 'No'
    default_value_rationale: >-
      Wyo. Stat. section 1-23-108 voids most non-compete covenants. The
      drafter must affirmatively include this covenant only when a statutory
      pathway applies.
    section: Covenant Matrix
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    default: 12 months
    default_value_rationale: >-
      12 months is the most common enforceable duration. Hassler v. Circle C
      Resources (2022 WY 28) struck down a 24-month provision with broad
      scope. No Wyoming court has upheld a non-compete exceeding 24 months.
    section: Covenant Matrix
  - name: noninvestment_included
    type: string
    description: >-
      Whether the non-investment covenant is included. Requires a lawful
      restriction pathway under Wyo. Stat. section 1-23-108.
    default: 'No'
    section: Covenant Matrix
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    default: 12 months
    section: Covenant Matrix
  - name: nondisparagement_included
    type: string
    description: Whether the reciprocal non-disparagement covenant is included
    default: 'Yes'
    section: Covenant Matrix
  - name: governing_law
    type: string
    description: Governing law state
    default: Wyoming
    section: Legal
  - name: venue
    type: string
    description: Venue for disputes
    default: state and federal courts in Wyoming
    section: Legal
  - name: cloud_drive_id
    type: string
    description: Optional document-system URI or file ID for execution copy traceability
    section: Document Management
  - name: cloud_drive_id_footer
    type: string
    description: Internal computed footer text for document-system traceability
    default: ''
    section: Document Management
priority_fields:
  - employer_name
  - employee_name
  - worker_category
  - restriction_pathways
