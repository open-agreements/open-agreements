name: Stockholder Consent for SAFE Financing
category: corporate-governance
description: >-
  Action by written consent of the stockholders of a Delaware corporation
  approving the issuance of one or more Simple Agreements for Future Equity
  (SAFEs). Derived from the Cooley Series Seed stockholder consent, adapted for
  SAFE financing.
source_url: https://github.com/cooleyLLP/seriesseed
version: '1.0'
license: CC0-1.0
allow_derivatives: true
authors:
  - name: Joey Tsang
    slug: joey-tsang
    role: primary_author
    profile_url: https://www.linkedin.com/in/joey-t-b90912b1/
attribution_text: >-
  Adapted by Joey Tsang for OpenAgreements from the Cooley Series Seed Stockholder Consent, available at
  https://github.com/cooleyLLP/seriesseed. Made available under CC0 1.0
  Universal Public Domain Dedication.
fields:
  - name: company_name
    type: string
    description: Full legal name of the company
    section: Parties
  - name: effective_date
    type: date
    description: Date the consent is effective
    section: Terms
  - name: purchase_amount
    type: string
    description: Aggregate SAFE purchase amount (e.g., "500,000")
    section: Deal Terms
  - name: stockholder_1_name
    type: string
    description: Full name of the first stockholder
    section: Signatures
  - name: stockholder_2_name
    type: string
    description: Full name of the second stockholder
    section: Signatures
  - name: stockholder_3_name
    type: string
    description: Full name of the third stockholder
    section: Signatures
priority_fields:
  - company_name
  - effective_date
  - purchase_amount
  - stockholder_1_name
  - stockholder_2_name
  - stockholder_3_name
