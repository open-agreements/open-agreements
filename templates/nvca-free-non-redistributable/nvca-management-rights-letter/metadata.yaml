name: Model Management Rights Letter
category: venture-financing
description: Management rights letter granting ERISA-qualifying management rights to venture capital fund investors.
source_url: https://nvca.org/wp-content/uploads/2025/12/NVCA-2020-Management-Rights-Letter-1-1.docx
source_version: '2020'
license_note: >-
  NVCA model documents are freely downloadable but not redistributable. This field-selector contains only transformation
  instructions, not the source document.
source_sha256: 9661d2a68ca20ee77cf553f1ec5804f08147e7e4c35f5a03938e76a778083e8b
optional: false
distribution: linked
artifact_type: field-selector
fields:
  - name: company_name_upper
    type: string
    description: >-
      Company name in uppercase. Fills both the uppercase signature-block slot ([COMPANY]) and the body's
      "Preferred Stock of ______ (the "Company")" blank, so the supplied value appears verbatim in both places —
      NVCA convention uppercases the signature block, so supply the name in uppercase.
  - name: letter_date
    type: date
    description: >-
      Date of the letter (fills the "______, 20__" dateline). Accepts ISO YYYY-MM-DD (rendered as e.g.
      "July 15, 2026") or a display-ready date string, which replaces the entire dateline including the
      pre-printed "20" — do not supply a partial date expecting the "20__" year stub to remain.
  - name: purchased_shares
    type: string
    description: Number of shares of preferred stock purchased by the investor (e.g. 1,000,000)
  - name: investor_name
    type: string
    description: Full name of the investor
  - name: investor_name_upper
    type: string
    description: Investor name in uppercase
  - name: city
    type: string
    description: City for the company address
  - name: state
    type: string
    description: State for the company address
  - name: street_address
    type: string
    description: Street address for the company
  - name: zip_code
    type: string
    description: ZIP code for the company address
  - name: company_letterhead
    type: string
    description: Portfolio company letterhead text
    default: ''
  - name: signature_page_marker
    type: string
    description: Signature page marker text
    default: Signature Page Follows
priority_fields:
  - company_name_upper
  - letter_date
  - purchased_shares
  - investor_name
  - investor_name_upper
  - city
  - state
  - street_address
  - zip_code
