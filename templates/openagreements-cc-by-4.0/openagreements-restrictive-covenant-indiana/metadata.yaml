name: Employee Restrictive Covenant (Indiana)
category: non-compete
description: 'Indiana-specific employee restrictive covenant agreement built for Indiana''s common-law reasonableness regime: there is no general Indiana non-compete statute, so every post-employment restraint is a disfavored restraint construed strictly against the employer, which must first prove a legitimate protectable interest and then carry the burden of showing the restraint reasonable in time, activity, and geographic area. It provides confidentiality and trade-secret protection anchored to the Indiana Uniform Trade Secrets Act (Ind. Code § 24-2-3-2), customer and employee non-solicitation each tied to a protectable interest, and an optional non-compete sized to the employer''s actual footprint. Because Indiana''s blue pencil is a strict eraser that deletes but never rewrites, and a court cannot add terms even where the agreement purports to authorize it, the covenants are drafted as grammatically severable, independently reasonable units rather than in reliance on judicial reformation. The employee non-solicitation covenant is scoped to a protectable-interest-limited Covered Employees class rather than the workforce at large. A liquidated-damages provision is omitted by default because a sum grossly disproportionate to the loss is an unenforceable penalty. Physician covenants are governed by a layered statute stack keyed to execution date (House Enrolled Act 1004 (2020) content requirements including the reasonable-price buyout; the Senate Enrolled Act 7 (2023) primary care ban; the Senate Enrolled Act 475 (2025) physician-hospital ban). Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-indiana
version: 0.1.0
stability: experimental
license: CC-BY-4.0
allow_derivatives: true
attribution_text: Authored by OpenAgreements contributors. Indiana-specific analysis informed by the quote-verified Indiana practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: 'Effective date of this agreement. The execution date is decisive for physician covenants: it selects which statutory layer governs (the July 1, 2020 content requirements, the July 1, 2023 primary care ban, and the July 1, 2025 physician-hospital ban).'
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: Governing law state
    display_label: Governing Law
    section: Legal
    default: Indiana
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    default_value_rationale: 24 months is common for non-trade-secret confidentiality obligations in employment agreements. A perpetual lid on non-secret information is the kind of unreasonable reach an Indiana court will not enforce, and because the eraser blue pencil cannot rewrite an overbroad term, the finite other-confidential track is kept severable from the perpetual trade-secret track.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee no-hire / non-solicitation covenant is included. Alabama's only category for restraints touching another party's workers is the no-hire exception for workers in a position uniquely essential to the management, organization, or service of the business.
    display_label: Employee No-Hire Included
    section: Employee Non-Solicitation
    rationale_source: editorial
    default: true
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/employee-non-solicit-duration
    section: Employee Non-Solicitation
    default_value_rationale: Indiana sets no statutory cap on duration; enforceability turns on the Krueger reasonableness test, on which the employer bears the burden as to time, activity, and geography. 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; 12 months is the common lighter alternative, sized to the employer's actual protectable interest.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: '12 months is the most common lookback period for employee non-solicitation scope. In Indiana this look-back is load-bearing: Heraeus voided an employee non-solicitation covenant that reached all of the company''s employees, and the eraser rule means a court cannot rewrite an all-employees class into a narrower one.'
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the current-customer non-solicitation covenant is included. Alabama gives this covenant its own category, limited to current customers.
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
    rationale_source: editorial
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/customer-non-solicit-duration
    section: Customer Non-Solicitation
    default_value_rationale: Indiana sets no statutory cap; a customer non-solicit maps directly onto the customer-goodwill interest and is often the most defensible restraint in the family. 12 months is the lighter side of the near-even 12/24-month split observed in benchmarked, publicly-filed employee agreements — a conservative duration counsel should size to the actual customer relationships protected.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope, and bounding the class to customers the employee actually served keeps it tied to the protectable interest the employer must prove.
  - name: noncompete_included
    type: boolean
    description: Whether the non-competition covenant is included. Indiana has no general non-compete statute; a non-compete is a disfavored restraint enforceable only to the extent it protects a legitimate interest and satisfies the Krueger reasonableness test in time, activity, and geography, with both burdens on the employer. This template recites the protectable-interest basis, sizes the restraint to the employer's actual footprint, and drafts it in severable tiers so an eraser pass leaves a working restraint.
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    default_value_rationale: Conservative default. The non-compete is the most disfavored covenant under the Krueger test, and Indiana's eraser blue pencil means an overreaching version dies rather than shrinks. A customer non-solicit backstopped by the Indiana Uniform Trade Secrets Act often protects the employer as well. Include only after confirming an identified protectable interest (confidential information, trade secrets, or customer goodwill), sizing the duration and territory to the actual footprint, and — for a physician — confirming the covenant is not statutorily banned.
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/non-compete-duration
    section: Non-Competition
    default_value_rationale: Indiana imposes no statutory cap on duration; the employer bears the burden of proving the time reasonable under Krueger, so there is no safe-harbor number. 12 months matches the modal non-compete term observed in benchmarked, publicly-filed employee agreements — a conservative default counsel should size to the actual role and market rather than copy from another form, stated as its own severable term so an eraser pass can address it in isolation.
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee provided services
    section: Non-Competition
    default_value_rationale: Tied to the employee's actual service area. Indiana imposes no statutory cap on territory, but the employer must prove the territorial reach reasonable, and an everywhere-the-company-operates footprint rarely survives that showing. A territory drafted in severable tiers lets an eraser pass remove the outer ring without killing the core.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. Narrowing the restriction to named competitors strengthens enforceability and gives the eraser blue pencil clearly divisible parts it can strike individually.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included. A non-dealing covenant has no named Alabama category of its own, so it must be drafted to fit inside the current-customer non-solicit exception or it is exposed to Alabama's void rule for restraints outside the listed categories.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
    rationale_source: editorial
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/passive-ownership-carveout
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the modal passive-investment carve-out threshold observed in benchmarked, publicly-filed employee agreements that include the carve-out (lower 1-3 percent thresholds are the common tighter alternatives). A clause that technically forbids holding index funds or ordinary public shares is gratuitous overbreadth an Indiana court will not soften by rewriting.
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included. A non-investment covenant has no named Alabama category; one genuine use is restraining a licensed professional's business conduct outside the practice of the profession, which sits outside Alabama's professional exemption.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
    rationale_source: editorial
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
  - name: worker_is_physician
    type: boolean
    description: Whether Employee is a physician. Set this explicitly from Employee's licensed role to include physician-specific terms. For Indiana, the applicable provisions vary by execution date and employer type, and may require a release buyout term or exclude the non-compete entirely.
    display_label: Employee Is a Physician
    section: Physician
  - name: physician_buyout_price
    type: string
    description: For a physician noncompete entered on or after July 1, 2020, the stated price or price mechanism for the physician's option to purchase a complete and final release from the covenant. The statute requires a reasonable price but does not define one, so a defensible mechanism should be stated rather than left open.
    display_label: Physician Release Buyout Price
    default: ''
    section: Physician
    rationale_source: legislation
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.indiana.require-hea-1004-provisions-in-physician-noncompetes
    default_value_rationale: Indiana's physician noncompete statute requires the buyout option but does not define a reasonable price, which has become a recurring point of dispute; the price or mechanism is therefore left for counsel to state rather than defaulted to a figure the statute does not supply.
omitted_clauses: drop
priority_fields:
  - employer_name
  - employee_name
distribution: bundled
artifact_type: template
