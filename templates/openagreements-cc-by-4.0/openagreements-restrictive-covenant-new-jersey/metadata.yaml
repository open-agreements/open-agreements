name: OpenAgreements Employee Restrictive Covenant (New Jersey)
category: non-compete
description: 'New Jersey-specific employee restrictive covenant agreement built for New Jersey''s common-law reasonableness regime: there is no general New Jersey non-compete statute for the ordinary workforce, so every post-employment restraint stands or falls on the three-part Solari/Whitmyer test (protects the employer''s legitimate interests, imposes no undue hardship on the employee, and is not injurious to the public). It provides confidentiality and trade-secret protection backstopped by the New Jersey Trade Secrets Act (N.J.S.A. 56:15-1 et seq.), a continued-employment consideration recital (Hogan v. Bergen Brunswig Corp.), customer and employee non-solicitation, an optional non-compete tied to identified legitimate interests and sized to the actual footprint, a breach-tied tolling clause (ADP, LLC v. Kusins; Community Hospital Group, Inc. v. More), physician public-interest scrutiny (Community Hospital Group, Inc. v. More; Pierson v. Medical Health Centers, P.A.), and partial enforcement that works with the grain of the doctrine (Solari Industries, Inc. v. Malady; ADP, LLC v. Rafferty). It carves out the discrimination-claim concealment bar (N.J.S.A. 10:5-12.8; Savage v. Township of Neptune) and disclaims practice restrictions for lawyers (RPC 5.6; Jacob v. Norris, McLaughlin & Marcus) and client-access restrictions for psychologists (N.J.A.C. 13:42-10.16; Comprehensive Psychology Sys., P.C. v. Prince). Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-new-jersey
version: 0.1.0
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. New Jersey-specific analysis informed by the quote-verified New Jersey practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: Governing law state
    display_label: Governing Law
    section: Legal
    default: New Jersey
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    default_value_rationale: 24 months is common for non-trade-secret confidentiality obligations in employment agreements.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee non-solicitation covenant is included
    display_label: Employee Non-Solicitation Included
    default: true
    section: Employee Non-Solicitation
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    section: Employee Non-Solicitation
    default_value_rationale: New Jersey sets no statutory cap on duration; enforceability turns on the holistic Solari/Whitmyer reasonableness test rather than a fixed number. 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; 12 months is the common lighter alternative, and counsel should size the term to the employer's actual legitimate interest.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for employee non-solicitation scope.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the customer/partner non-solicitation covenant is included
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: New Jersey sets no statutory cap; a customer non-solicit maps directly onto the employer's customer-relationship interest and is often the better instrument than a full non-compete. 12 months is a common, conservative duration counsel should size to the actual customer relationships protected.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope.
  - name: noncompete_included
    type: boolean
    description: Whether the non-competition covenant is included. New Jersey has no general non-compete statute for the ordinary workforce; a non-compete is enforceable only to the extent it satisfies the three-part Solari/Whitmyer reasonableness test and is tied to a legitimate interest rather than ordinary competition. This template recites the legitimate-interest basis and sizes the restraint to the employer's actual footprint.
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    default_value_rationale: Conservative default. The non-compete is the most closely scrutinized covenant under the Solari/Whitmyer test; a customer non-solicit backstopped by the New Jersey Trade Secrets Act often protects the employer as well. Include only after confirming an identified legitimate interest (confidential business information, trade secrets, or customer relationships) and sizing the duration and territory to the actual footprint.
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    section: Non-Competition
    default_value_rationale: New Jersey imposes no statutory cap on duration; courts weigh time and territory together against the employer's real legitimate interest under Solari/Whitmyer, so there is no safe-harbor number, though durations in the one-to-two-year range are commonly upheld where the geography is tailored. 12 months is a common, conservative default counsel should size to the actual role and market rather than copy from another form.
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee provided services
    section: Non-Competition
    default_value_rationale: Tied to the employee's actual service area. New Jersey imposes no statutory cap on territory; courts weigh territory against the public's access to the service and will shrink a radius that overreaches, so a narrower area genuinely needed to protect customer relationships or confidential information is far easier to defend under Solari/Whitmyer than a statewide ban.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. Narrowing the restriction to named competitors strengthens enforceability.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the standard passive investment carveout across restrictive covenant agreements.
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
priority_fields:
  - employer_name
  - employee_name
