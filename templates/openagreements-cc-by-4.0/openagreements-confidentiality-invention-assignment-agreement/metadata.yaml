name: Confidentiality & Invention Assignment Agreement (CIIAA)
category: employment
description: Employee proprietary information and inventions assignment agreement with explicit prior-inventions and personal-project carveout language placeholders.
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-confidentiality-invention-assignment-agreement
version: '1.3'
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Baseline structure inspired by permissive public references including the Balanced Employee IP Agreement (CC0) and Papertrail legal-docs (CC0). Licensed under CC BY 4.0.
fields:
  - name: company_name
    type: string
    description: Legal name of employer
    section: Parties
  - name: company_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the company
    section: Parties
  - name: company_signatory_title
    type: string
    description: Title of the authorized signatory signing for the company
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of employee
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    section: Timing
  - name: prior_inventions_disclosure
    type: string
    description: List of prior inventions excluded from assignment, or None
    section: Inventions
  - name: excluded_inventions_statement
    type: string
    description: Carveout statement for independently developed inventions
    default: Inventions Employee develops entirely on personal time without using company equipment, supplies, facilities, or trade secret information are excluded, except for inventions that either (a) relate to company business or its actual or demonstrably anticipated research or development, or (b) result from work performed for the company.
    section: Inventions
  - name: return_of_materials_timing
    type: string
    description: Timing for return or deletion of company materials
    section: Confidentiality
  - name: post_termination_assistance
    type: string
    description: Cooperation obligations after termination
    default: reasonable assistance with filings and signatures related to assigned inventions
    section: Inventions
  - name: governing_law
    type: string
    description: Governing law state
    section: Legal
  - name: venue
    type: string
    description: Venue for disputes
    default: state and federal courts in the governing law state
    section: Legal
priority_fields: []
