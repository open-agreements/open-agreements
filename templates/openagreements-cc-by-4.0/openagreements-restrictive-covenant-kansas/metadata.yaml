name: Employee Restrictive Covenant (Kansas)
category: non-compete
description: 'Kansas-specific employee restrictive covenant agreement built for Kansas''s common-law reasonableness regime: an employee non-compete is enforceable only as an adjunct to a lawful employment contract, when reasonable under the four-factor common-law test (legitimate business interest, no undue burden on the employee, no injury to the public welfare, and reasonable time and territory), with the employer carrying the burden and Kansas appellate courts reviewing enforceability without deference. It provides confidentiality and trade-secret protection alongside the Kansas Uniform Trade Secrets Act (K.S.A. 60-3320, 60-3326), a continued-at-will-employment consideration recital, a customer non-solicitation covenant drawn to the K.S.A. 50-163(c)(5) two-year material-contact-customer safe harbor, an employee non-solicitation covenant on ordinary reasonableness, an optional non-compete tied to identified protectable interests and sized to the actual footprint, a fixed-term no-open-ended-tolling clause, equitable narrowing that the drafting does not rely on (a court reduces an overbroad restraint but does not rewrite an already-reasonable term, and the K.S.A. 50-163(b) reformation command does not reach non-competes, which the Act excludes at § 50-163(e)(6)), and a physician covenant on the ordinary reasonableness test (no Kansas healthcare non-compete ban). Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-kansas
version: 0.1.0
stability: experimental
license: CC-BY-4.0
allow_derivatives: true
attribution_text: Authored by OpenAgreements contributors. Kansas-specific analysis informed by the quote-verified Kansas practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: Governing law state
    display_label: Governing Law
    section: Legal
    default: Kansas
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    default_value_rationale: 24 months is common for non-trade-secret confidentiality obligations in employment agreements. Kansas protects non-trade-secret information by contract alone (K.S.A. 60-3326(b)(1)), and a contract term is enforced only as far as it is reasonable, so a finite period is easier to defend than a perpetual lid on ordinary confidential information.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee no-hire / non-solicitation covenant is included.
    display_label: Employee No-Hire Included
    section: Employee Non-Solicitation
    rationale_source: editorial
    default: true
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/employee-non-solicit-duration
    section: Employee Non-Solicitation
    default_value_rationale: The Kansas statutory safe harbors run to customer solicitation and owner covenants; they do not create a safe harbor for an employer-employee coworker no-recruit covenant, so this clause stands on the statute's general reasonableness baseline. 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; 12 months is the common lighter alternative, sized to the employer's actual interest in workforce stability.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for employee non-solicitation scope.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the current-customer non-solicitation covenant is included.
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
    rationale_source: editorial
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 24 months
    rationale_source: legislation
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.kansas.fit-customer-nonsolicit-within-the-two-year-material-contact-safe-harbor
    section: Customer Non-Solicitation
    default_value_rationale: An employee customer non-solicitation covenant limited to material contact customers and running no more than two years after employment ends is conclusively presumed enforceable and not a restraint of trade under the Kansas statute. 24 months tracks the outer edge of that statutory safe harbor; counsel should size it down to the actual customer relationships protected, because a term past two years forfeits the presumption and falls back to the general reasonableness baseline.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope.
  - name: noncompete_included
    type: boolean
    description: Whether the non-competition covenant is included. Kansas enforces an employee non-compete only to the extent it is ancillary to a lawful employment contract and satisfies the four-factor reasonableness test; the Kansas Restraint of Trade Act excludes covenants not to compete, so the statutory presumptions and reformation command do not support it. This template recites the protectable-interest basis and sizes the restraint to the employer's actual footprint.
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    rationale_source: case_law
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.kansas.satisfy-the-weber-reasonableness-factors
    default_value_rationale: Conservative default. The non-compete is the most heavily scrutinized covenant under the four-factor reasonableness test; the employer carries the burden and enforceability gets a fresh, unlimited review on appeal. A customer non-solicit drawn to the Kansas statutory safe harbor, backstopped by the Kansas Uniform Trade Secrets Act, often protects the employer with far more certainty. Include only after confirming an identified protectable interest (confidential information, trade secrets, customer relationships, or referral sources) and sizing the duration and territory to the actual footprint.
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/non-compete-duration
    section: Non-Competition
    default_value_rationale: Kansas sets no statutory ceiling on a non-compete term; the time factor is weighed against the employer's real protectable interest under the four-factor reasonableness test, so there is no safe-harbor number. 12 months matches the modal non-compete term observed in benchmarked, publicly-filed employee agreements — a conservative default counsel should size to the actual role and market rather than copy from another form; Kansas authority has treated a two-year non-compete term as reasonable on its facts but that is fact-specific, not a ceiling.
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee provided services
    section: Non-Competition
    rationale_source: case_law
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.kansas.satisfy-the-weber-reasonableness-factors
    default_value_rationale: Tied to the employee's actual service area. Kansas imposes no statutory cap on territory; a narrower area genuinely needed to protect the employer's interest is far easier to defend under the four-factor reasonableness test than a statewide ban, and Kansas territorial authority cut an excessive area down to only what was necessary and enforced just that.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. Narrowing the restriction to named competitors strengthens enforceability.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
    rationale_source: editorial
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 24 months
    section: No Business with Covered Customers
    default_value_rationale: The K.S.A. 50-163(c)(5) safe harbor reaches acceptance and transfer of a customer's business, not just outreach, so a non-dealing clause limited to material contact customers and capped at two years can ride the same conclusive presumption as the customer non-solicit. 24 months tracks the outer edge of that safe harbor; counsel should size it down to the goodwill actually protected.
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/passive-ownership-carveout
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the modal passive-investment carve-out threshold observed in benchmarked, publicly-filed employee agreements that include the carve-out (lower 1-3 percent thresholds are the common tighter alternatives).
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
    rationale_source: editorial
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
  - name: worker_is_physician
    type: boolean
    description: Whether Employee is a physician. Set this explicitly from Employee's licensed role to include physician-specific terms.
    display_label: Employee Is a Physician
    section: Physician
omitted_clauses: drop
priority_fields:
  - employer_name
  - employee_name
distribution: bundled
artifact_type: template
