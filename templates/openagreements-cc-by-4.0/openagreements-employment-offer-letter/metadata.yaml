name: OpenAgreements Employment Offer Letter
category: employment
description: A startup-focused employment offer letter template for full-time or part-time hiring with compensation, equity summary, and at-will framing.
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-employment-offer-letter
version: '1.1'
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Drafting structure informed by publicly available permissive sources including the DocuSign template library (MIT) and Papertrail legal-docs (CC0). Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    section: Parties
  - name: position_title
    type: string
    description: Offered role title
    section: Role
  - name: employment_type
    type: enum
    description: Employment basis
    options:
      - full-time
      - part-time
    section: Role
  - name: start_date
    type: date
    description: Employment start date
    section: Timing
  - name: reporting_manager
    type: string
    description: Manager or role this position reports to
    section: Role
  - name: base_salary
    type: string
    description: Base salary or hourly amount
    section: Compensation
  - name: bonus_terms
    type: string
    description: Bonus eligibility summary
    section: Compensation
  - name: equity_terms
    type: string
    description: Equity grant summary, if any
    section: Compensation
  - name: work_location
    type: string
    description: Primary work location and/or remote status
    section: Work Model
  - name: governing_law
    type: string
    description: Governing law state for the offer letter
    default: California
    section: Legal
  - name: california_specific_terms
    type: boolean
    description: True when the employee primarily works in California, gating (via include-when) the California-Specific Terms clause (paid sick leave, workers' compensation, California Labor Code coverage). Default true because our user base skews California; when filling for an employee outside California, set this false to strip the California-specific clause.
    default: true
    section: Legal
  - name: offer_expiration_date
    type: date
    description: Date by which the offer must be accepted
    section: Timing
priority_fields: []
