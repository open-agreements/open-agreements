name: Employee Restrictive Covenant (Maryland)
category: non-compete
description: 'Maryland-specific employee restrictive covenant agreement built for Md. Code, Lab. & Empl. § 3-716: confidentiality and trade-secret protection anchored on the Maryland Uniform Trade Secrets Act, an employee non-solicitation covenant, a customer non-solicitation covenant tied to Maryland''s protectable client- relationship interest and the statute''s client-list carve-out, and an optional non-compete drawn to the common-law reasonableness standard. The agreement recites the statutory worker-class voids that make a covenant null and void outright for low-wage employees (150% or less of the State minimum wage), veterinary practitioners and technicians, and most direct-patient-care Health Occupations Article licensees earning $350,000 or less, and it caps a covered high-earner clinician covenant at one year and ten miles. Consideration rests on continued at-will employment, and each covenant is drafted in severable tiers for Maryland''s strict blue-pencil rule rather than relying on discretionary judicial reformation. Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-maryland
version: 0.1.0
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Maryland-specific analysis informed by the quote-verified Maryland practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: 'Effective date of this agreement. In Maryland the execution date sorts the covenant into a regime: the health-care void and the high-earner clinician cap reach only agreements executed on or after July 1, 2025, and the architect category reaches only agreements executed on or after October 1, 2026, while the veterinary ban reaches backward to existing agreements.'
    display_label: Effective Date
    section: Timing
    rationale_source: editorial
  - name: governing_law
    type: string
    description: Governing law state. Maryland records no statutory override of contractual choice of law for restrictive covenants, but the Maryland noncompete statute declares covered covenants null and void as against the public policy of the State, so for a Maryland-based worker a foreign-law selection invites a public-policy fight rather than a clean escape; this should remain Maryland for a Maryland-based worker.
    display_label: Governing Law
    section: Legal
    default: Maryland
    rationale_source: editorial
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
    rationale_source: legislation
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.tie-trade-secret-duration-to-secrecy-status
    default_value_rationale: Maryland's Uniform Trade Secrets Act keys trade-secret status to information that stays not generally known and is subject to reasonable secrecy efforts, with no expiration, so a status-bounded duration captures the full protection the law allows; a shorter fixed term is enforceable but gives up the tail of that protection.
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    default_value_rationale: 24 months is common for non-trade-secret confidentiality obligations in employment agreements. A finite term keeps the non-secret obligation sized to the interest behind it, since a perpetual lid on non-secret information reads as overbreadth under the Becker reasonableness test.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee non-solicitation covenant is included
    display_label: Employee Non-Solicitation Included
    default: true
    section: Employee Non-Solicitation
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    section: Employee Non-Solicitation
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/employee-non-solicit-duration
    default_value_rationale: 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; 12 months is the common lighter alternative. Maryland's noncompete statute does not address employee non-solicits, so the clause is judged on ordinary common-law reasonableness, and a relationship-based term supports that characterization.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for employee non-solicitation scope.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the customer/partner non-solicitation covenant is included
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/customer-non-solicit-duration
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the lighter side of the near-even 12/24-month split observed in benchmarked, publicly-filed employee agreements and is a common enforceable duration here. Protecting client relationships and client data is squarely inside the interests Maryland recognizes under Becker, and the statute's (a)(2) carve-out spares client-list provisions; a shorter, contact-scoped term keeps the covenant no wider than reasonably necessary.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope.
  - name: noncompete_included
    type: boolean
    description: 'Whether the non-competition covenant is included. Under the Maryland noncompete statute, a noncompete is null and void outright for whole worker classes: low-wage employees at or under 150% of the State minimum wage, veterinary practitioners and technicians, and most direct-patient-care Health Occupations Article licensees earning $350,000 or less for agreements executed on or after July 1, 2025. It is also capped at one year and ten miles for higher-earning clinicians. A surviving covenant must still satisfy common-law reasonableness. This template recites those gates when the covenant is included.'
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    rationale_source: editorial
    default_value_rationale: 'Conservative default. Run the worker''s wage and occupation through the Maryland statutory gates before including a non-compete: the covenant is void regardless of drafting for a low-wage, veterinary, or covered health-care worker, and for a higher-earning clinician it must stay inside the one-year and ten-mile cap. Include only after confirming the worker clears every void class and, where the clinician cap applies, the term and radius stay within it, and after drafting the covenant to the common-law reasonableness standard.'
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    section: Non-Competition
    rationale_source: legislation
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.maryland.cap-high-earner-clinician-covenant-at-one-year-and-ten-miles
    default_value_rationale: 12 months is a common enforceable duration. Maryland sets no fixed cap for an ordinary employee; the courts apply no arbitrary yardstick. But a covered high-earner clinician covenant may not exceed one year from the last day of employment, so a 12-month default stays within that ceiling.
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee actually built customer relationships or used protected information
    section: Non-Competition
    rationale_source: editorial
    default_value_rationale: Tied to where the worker actually built relationships or used protected information rather than the employer's footprint. Maryland calls a restraint overbroad the moment it exceeds what is reasonably necessary to protect the employer's legally protected interest, and for a covered high-earner clinician the territory may not exceed ten miles from the primary place of employment.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. Naming the employer's real competitors is the most concrete evidence a covenant is no broader than reasonably necessary, which matters in Maryland because a court blue-pencils rather than rewrites an overbroad clause into a lawful one.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/passive-ownership-carveout
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the modal passive-investment carve-out threshold observed in benchmarked, publicly-filed employee agreements that include the carve-out (lower 1-3 percent thresholds are the common tighter alternatives), and a clause forbidding ordinary index funds and public shares is gratuitous overbreadth that hands the employee an argument for free.
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
priority_fields:
  - employer_name
  - employee_name
