name: OpenAgreements Employee Restrictive Covenant (Louisiana)
category: non-compete
description: 'Louisiana-specific employee restrictive covenant agreement built for La. R.S. 23:921''s void-unless-excepted rule: confidentiality and trade-secret protection, a customer non-solicitation and an optional non-compete drawn to fit the § 23:921(C) employee exception (named parishes or municipalities, a like business carried on there, and no more than two years from termination), an employee non-solicitation covenant reviewed under the common-law reasonableness standard, an effective-date recital tying the covenants to the start of employment, physician burn-off caps, occupation carve-outs (automobile salesmen, interns and apprentices, real estate licensees), and a Louisiana-law-and-forum selection — with no judicial reformation, because a non-compliant Louisiana covenant is severed rather than rewritten. Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-louisiana
version: 0.1.0
stability: experimental
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Louisiana-specific analysis informed by the quote-verified Louisiana practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: 'Effective date of this agreement. In Louisiana the effective date can decide enforceability: the employee exception reaches a person who is employed, and a covenant signed before employment begins has been saved only where the agreement fixes an effective date equal to the worker''s first day on the job. Set this on or after the first day of work.'
    rationale_source: case_law
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.louisiana.ensure-employment-exists-on-covenant-effective-date
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: 'Governing law state. For a Louisiana employee this should be Louisiana: La. R.S. 23:921(A)(2) voids a choice-of-law or choice-of-forum clause in an employment contract unless the employee ratifies it after the dispute arises, so a foreign selection is a red flag rather than a fix.'
    display_label: Governing Law
    section: Legal
    default: Louisiana
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    default_value_rationale: 24 months is common for non-trade-secret confidentiality obligations in employment agreements. In Louisiana a confidentiality lid so broad that honoring it would keep the worker from working in the field risks reading as a restraint on a lawful profession under La. R.S. 23:921(A)(1), so a finite term is preferable to everything-forever.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee non-solicitation (anti-poaching) covenant is included. Louisiana case law treats a promise not to recruit former colleagues as outside the Noncompetition Agreement Act, but it must still be reasonable in scope and duration; a clause with no durational limit fails.
    display_label: Employee Non-Solicitation Included
    default: true
    rationale_source: case_law
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.louisiana.require-duration-limit-in-employee-anti-poaching-clause
    section: Employee Non-Solicitation
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/employee-non-solicit-duration
    section: Employee Non-Solicitation
    default_value_rationale: 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; either term states the explicit end date Farris requires — the court refused to enforce an anti-poaching clause where the agreement was devoid of any language fixing a duration. Because this covenant sits outside La. R.S. 23:921, the two-year statutory ceiling does not govern it; counsel should still keep the term reasonable, and 12 months is the common lighter alternative.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for employee non-solicitation scope, and a class kept to colleagues the departing worker actually worked with supports the Farris reasonableness requirement.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the customer non-solicitation covenant is included. In Louisiana a customer non-solicit restrains the worker's own trade and sits inside the La. R.S. 23:921(C) employee exception, so it must name parishes or municipalities where the employer carries on a like business and run no more than two years from termination.
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/customer-non-solicit-duration
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common customer non-solicit term in benchmarked, publicly-filed employee agreements, edging out 24 months by only a narrow margin, and it sits well inside Louisiana's statutory ceiling of two years from termination of employment. Because a non-compliant Louisiana covenant is not reformed but simply fails, the tool defaults inside the statutory window rather than at its outer edge.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the customer non-solicitation restriction.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope, and bounding the customer class to relationships the worker actually served narrows a clause La. R.S. 23:921 already reads strictly.
  - name: restricted_territory_parishes
    type: string
    description: The specified parish or parishes, municipality or municipalities, or parts thereof — named, not described by radius — where the employer carries on a like business. The Noncompetition Agreement Act requires an enumerated list, and Louisiana case law rejected a 75-mile-radius restriction as overly broad. Applies to the non-compete and the customer non-solicitation.
    display_label: Restricted Territory (Named Parishes or Municipalities)
    rationale_source: legislation
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.louisiana.name-parishes-or-municipalities-in-restricted-territory
    section: Restricted Territory
    default_value_rationale: Left for counsel to enumerate. A mileage radius or a catch-all reaching anywhere the employer operates does not satisfy the statute, and because Louisiana courts sever rather than rewrite, an overbroad territory is struck, not trimmed to fit.
  - name: noncompete_included
    type: boolean
    description: Whether the non-competition covenant is included. Under the Noncompetition Agreement Act every restraint on a lawful profession, trade, or business is null and void except as the Act provides; a non-compete survives only inside the employee exception (named parishes, a like business, two years from termination) and is strictly construed against the employer.
    display_label: Non-Competition Included
    default: false
    rationale_source: editorial
    section: Non-Competition
    default_value_rationale: Conservative default. The non-compete is the most heavily scrutinized covenant and is void unless it fits a statutory exception. Include it only after confirming the employee-exception elements are met, the worker is not in a barred occupation (automobile salesman, or — for agreements effective on or after August 1, 2026 — an intern or apprentice), and any physician or real estate licensee rule is addressed.
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/non-compete-duration
    section: Non-Competition
    default_value_rationale: 12 months matches the modal non-compete term observed in benchmarked, publicly-filed employee agreements — a common, conservative pick that sits well inside Louisiana's statutory ceiling of two years from termination of employment. A term past two years is not negotiated down by a Louisiana court; a non-compliant covenant may not be reformed and simply fails, so the tool does not default to a term at or beyond the ceiling.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer. La. R.S. 23:921(C) permits restraining only a business similar to that of the employer, so this should describe what the employer concretely does; reaching lines of business the employer never carried on stretches past the exception.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. In a strict-construction regime, binding named competitors instead of an open-ended definition removes ambiguity a court would resolve against enforcement.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: worker_is_physician
    type: boolean
    description: Whether the employee is a physician. For contracts effective on or after January 1, 2025, La. R.S. 23:921(M)/(N) (Act 273 of 2024) caps a physician restraint at three years from the effective date of the initial contract for a primary care physician and five years for any other physician — a burn-off measured from signing, not from termination.
    display_label: Employee Is a Physician
    default: false
    section: Non-Competition
  - name: worker_is_real_estate_licensee
    type: boolean
    description: Whether the employee is a real estate broker-licensee. Under La. R.S. 37:1448.1(A) a broker-licensee non-compete is an absolute nullity unless the licensee may rescind it until midnight of the third business day following execution or delivery, whichever is later.
    display_label: Employee Is a Real Estate Licensee
    default: false
    section: Non-Competition
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included. A bar on doing business with covered customers even when they call first restrains the worker's own trade more than a solicitation ban, and the Noncompetition Agreement Act names no lane for it, so it carries residual nullity risk.
    display_label: No Business with Covered Customers Included
    default: false
    rationale_source: editorial
    section: No Business with Covered Customers
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
    default_value_rationale: 12 months mirrors the two-year statutory ceiling as a conservative outer bound, though the covenant itself is unaddressed by the statute and its inclusion is a deliberate risk decision.
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the standard passive investment carveout across restrictive covenant agreements. A clause forbidding ordinary public shares would restrain more than the statutory exception describes.
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included. Investment language broad enough to operate as a restraint on the worker's profession is the conduct La. R.S. 23:921(A)(1) voids, so this covenant is rare and deliberate in Louisiana.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
    default_value_rationale: 12 months mirrors the conservative outer bound used for the other covenants; counsel should confirm the passive-holdings carve-out is intact so the clause does not read as a restraint on a lawful profession.
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
priority_fields:
  - employer_name
  - employee_name
