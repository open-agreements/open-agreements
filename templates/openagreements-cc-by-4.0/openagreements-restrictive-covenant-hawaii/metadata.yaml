name: OpenAgreements Employee Restrictive Covenant (Hawaii)
category: non-compete
description: 'Hawaii-specific employee restrictive covenant agreement built for HRS chapter 480''s restraint-of-trade framework: confidentiality and trade-secret protection, customer and employee non-solicitation, and an optional non-compete, each drawn to the legitimate-ancillary-purpose screen of HRS section 480-4(c) and the Traeger reasonableness factors. Non-competes and employee non-solicits are struck automatically when the employer is a technology business (HRS section 480-4(d)), leaving the trade-secret covenant as the surviving restraint. The Solicit definition tracks Gagnon''s active-initiation standard, and each restraint is drawn to its minimum supporting interest rather than in reliance on judicial narrowing. Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-hawaii
version: 0.1.0
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Hawaii-specific analysis informed by the quote-verified Hawaii practice note (HRS sections 480-4, 480-13, 480-2, 482B-8; Prudential Locations, LLC v. Gagnon; 7's Enterprises, Inc. v. Del Rosario; Technicolor, Inc. v. Traeger). Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: Governing law state
    display_label: Governing Law
    section: Legal
    default: Hawaii
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    rationale_source: editorial
    default_value_rationale: 24 months is a common finite term for non-trade-secret confidentiality obligations in employment agreements. Hawaii sets no statutory ceiling; a finite term keeps the practical restraint auditable under Hawaii's anticompetitive-effect screen.
  - name: employer_is_technology_business
    type: boolean
    description: 'Hawaii only. Whether the employer is a technology business: a trade or business that derives the majority of its gross income from selling or licensing products or services resulting from its software development or information technology development, or both, excluding broadcast businesses and certain regulated telecommunications carriers. When true, the non-competition and employee non-solicitation covenants are prohibited, void, and of no force and effect against an employee of the technology business, and only the trade-secret covenant survives.'
    display_label: Employer Is a Technology Business (Hawaii)
    default: false
    section: Hawaii Statutory Gates
    rationale_source: editorial
    default_value_rationale: Conservative default. Coverage keys to the EMPLOYER'S revenue mix, not the worker's job title; confirm whether the employing entity derives the majority of its gross income from software or information technology development before including any non-compete or employee non-solicit.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee non-solicitation covenant is included. Analyzed as a restraint of trade requiring its own legitimate ancillary purpose under Hawaii law, and void for an employee of a technology business under Hawaii's technology-business rule.
    display_label: Employee Non-Solicitation Included
    default: true
    section: Employee Non-Solicitation
    rationale_source: editorial
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    section: Employee Non-Solicitation
    default_value_rationale: Hawaii fixes no statutory maximum. Length of time is one of the factors a court examines under the Traeger reasonableness test; the period should be the shortest the workforce-stability interest credibly requires. 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; it is offered as a market reference, not a statutory benchmark, and counsel should shorten toward 12 months or less where the interest is exhausted sooner.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    rationale_source: editorial
    default_value_rationale: 12 months is a common lookback period. It keeps the covered class tethered to colleagues the departing worker actually worked with, which supports the legitimate ancillary purpose the covenant needs under Hawaii law.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the customer/partner non-solicitation covenant is included. Analyzed as a restraint of trade requiring a legitimate ancillary purpose; enforcement turns on proof of active initiation of contact under Gagnon.
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: Hawaii fixes no statutory maximum; duration is weighed for reasonableness under the Traeger factors. 12 months is a conservative starting point tied to the near-permanence of the customer relationship the covenant protects, for counsel to shorten or justify.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is a common lookback period, keeping the covered class limited to special customer relationships the worker actually built — an interest Hawaii recognizes as protectable (Del Rosario).
  - name: noncompete_included
    type: boolean
    description: Whether the non-competition covenant is included. In Hawaii, a non-compete is a restraint of trade lawful only when ancillary to a legitimate purpose and not substantially anticompetitive; preventing competition is not a legitimate purpose. Even a covenant that satisfies every Traeger reasonableness factor is unenforceable without that ancillary purpose, and it is void entirely for an employee of a technology business.
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    rationale_source: editorial
    default_value_rationale: Conservative default. The non-compete is the most heavily scrutinized covenant in Hawaii; include only after confirming the employer is not a technology business, that a specific protected interest (trade secrets, genuinely confidential information, special customer relationships, or specialized training combined with other factors) supports it, and that its scope is drawn no broader than that interest requires.
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    section: Non-Competition
    default_value_rationale: Hawaii imposes no statutory maximum duration, but length of time is one of the Traeger reasonableness factors and a reasonable period is a condition of the statutory covenant framework. 12 months is a conservative starting point for counsel to shorten or justify against the specific protected interest, not a statutory safe harbor.
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee provided services
    section: Non-Competition
    default_value_rationale: Geographic scope is examined alongside duration and breadth, and the contract's own territory controls what can be enforced — in Del Rosario a statewide injunction was remanded to the covenant's County of Honolulu limit. Tie the territory to where the protected interest actually operates.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. In a state whose courts refuse to credit competition-blocking as a purpose, binding the covenant to named competitors is the cleanest way to show it protects a specific interest against specific rivals rather than fencing the market.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included. It reaches passive conduct that Gagnon's active-initiation solicitation standard deliberately excludes, so it is a harsher restraint that needs its own legitimate-purpose justification.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
    default_value_rationale: 12 months is a conservative starting point; duration is weighed under the Traeger factors and should be justified against the specific customer relationship the covenant protects.
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the standard passive investment carveout across restrictive covenant agreements, and a carve-out avoids adding undue hardship — one of the three Traeger grounds of unreasonableness — with no protected interest behind it.
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
    default_value_rationale: 12 months is a conservative starting point; an investment restraint is a restraint of trade weighed under the same ancillary-purpose and Traeger reasonableness limits as the non-compete.
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
priority_fields:
  - employer_name
  - employee_name
