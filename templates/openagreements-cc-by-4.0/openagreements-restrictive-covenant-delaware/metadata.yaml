name: Employee Restrictive Covenant (Delaware)
category: non-compete
description: 'Delaware-specific employee restrictive covenant agreement built for Delaware''s common-law reasonableness regime: there is no general Delaware non-compete statute, so every post-employment restraint stands or falls on the Court of Chancery''s three-part review (reasonable in geographic scope and temporal duration, advancing a legitimate economic interest, and surviving a balancing of the equities), evaluated holistically across every dimension of the covenant (FP UC Holdings, LLC v. Hamilton; Sunder Energy, LLC v. Jackson). It provides confidentiality and trade-secret protection backstopped by the Delaware Uniform Trade Secrets Act (6 Del. C. §§ 2001-2007), a formation-stage consideration recital that names the value exchanged (Research & Trading Corp. v. Powell; North American Fire Ultimate Holdings, LP v. Doorly; Payscale Inc. v. Norman), customer and employee non-solicitation, an optional non-compete sized to identified legitimate interests, physician practice-covenant compliance that voids any practice restraint while preserving reasonably related damages (6 Del. C. § 2707), a home-inspector-trainee carve-out (24 Del. C. § 4109(d)), a Delaware choice-of-law anchor bounded by its statutory and conflict-of-law limits (6 Del. C. § 2708; Ascension Insurance Holdings, LLC v. Underwood), and a draft-the-scope reformation posture the agreement does not rely on because recent decisions increasingly refuse to blue-pencil an overbroad covenant (Kodiak Building Partners, LLC v. Adams; Intertek Testing Services NA, Inc. v. Eastman; Sunder Energy, LLC v. Jackson (Del. 2024)). Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-delaware
version: 0.1.0
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Delaware-specific analysis informed by the quote-verified Delaware practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: Governing law state
    display_label: Governing Law
    section: Legal
    default: Delaware
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    default_value_rationale: 24 months is common for non-trade-secret confidentiality obligations in employment agreements.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee non-solicitation covenant is included
    display_label: Employee Non-Solicitation Included
    default: true
    section: Employee Non-Solicitation
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/employee-non-solicit-duration
    section: Employee Non-Solicitation
    default_value_rationale: Delaware sets no statutory cap on duration; enforceability turns on the Court of Chancery's holistic reasonableness review rather than a fixed number. 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; 12 months is the common lighter alternative, and counsel should size the term to the employer's actual legitimate interest.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for employee non-solicitation scope.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the customer/partner non-solicitation covenant is included
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/customer-non-solicit-duration
    section: Customer Non-Solicitation
    default_value_rationale: Delaware sets no statutory cap; a customer non-solicit tied to specific, identified customer relationships is the business-specific interest Delaware credits and is often the better instrument than a full non-compete. 12 months is the lighter side of the near-even 12/24-month split observed in benchmarked, publicly-filed employee agreements — a conservative duration counsel should size to the actual customer relationships protected.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope.
  - name: noncompete_included
    type: boolean
    description: Whether the non-competition covenant is included. Delaware has no general non-compete statute; a non-compete is enforceable only to the extent it satisfies the Court of Chancery's three-part reasonableness review — it must be reasonable in geographic scope and temporal duration, advance a legitimate economic interest, and survive a balancing of the equities — evaluated holistically against every other restriction in the contract. This template recites the legitimate-interest basis and sizes the restraint to the employer's actual footprint at the drafting table, because recent decisions increasingly refuse to blue-pencil an overbroad covenant.
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    default_value_rationale: Conservative default. The non-compete is the most heavily scrutinized covenant under the Delaware reasonableness review; a customer non-solicit backstopped by the Delaware Uniform Trade Secrets Act often protects the employer as well. Include only after confirming a recognized legitimate interest (employer goodwill or confidential information) and sizing the duration and territory to the actual footprint — a court may let an overbroad covenant fail rather than rewrite it.
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/non-compete-duration
    section: Non-Competition
    default_value_rationale: Delaware imposes no statutory cap on duration; the Court of Chancery weighs time and territory together with every other dimension against the employer's real legitimate interest, so there is no safe-harbor number. 12 months matches the modal non-compete term observed in benchmarked, publicly-filed employee agreements — a conservative default counsel should size to the actual role and market rather than copy from another form.
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee provided services
    section: Non-Competition
    default_value_rationale: Tied to the employee's actual service area. Geographic scope is the first prong of the Delaware reasonableness review; a narrower area genuinely needed to protect employer goodwill or confidential information is far easier to defend than a broad or nationwide ban, and an overbroad territory risks the whole covenant because Delaware courts increasingly decline to trim overreach.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. Narrowing the restriction to named competitors strengthens enforceability.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/passive-ownership-carveout
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the modal passive-investment carve-out threshold observed in benchmarked, publicly-filed employee agreements that include the carve-out (lower 1-3 percent thresholds are the common tighter alternatives).
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
priority_fields:
  - employer_name
  - employee_name
