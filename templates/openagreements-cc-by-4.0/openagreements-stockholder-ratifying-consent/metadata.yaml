name: Stockholder Consent Ratifying a Defective Corporate Act
category: corporate-governance
description: Action by written consent of the stockholders of a Delaware corporation approving the board's ratification of a defective corporate act under Section 204 of the Delaware General Corporation Law — approving the specifically identified act, and approving any related charter amendment or certificate of validation the cure requires.
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-stockholder-ratifying-consent
version: 0.1.0
stability: experimental
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Drafting structure informed by publicly available Delaware Section 204 ratification practice. Licensed under CC BY 4.0.
fields:
  - name: company_name
    type: string
    description: Full legal name of the Delaware corporation
    section: Parties
  - name: consent_date
    type: date
    description: Date the stockholder consent is effective and signed
    section: Terms
  - name: board_consent_reference
    type: string
    description: Reference to the board ratifying consent being approved (for example, "the Action by Written Consent of the Board of Directors dated March 1, 2026")
    section: Terms
  - name: defective_acts
    type: string
    description: Description of the defective corporate act ratified by the Board and approved here (for example, "the issuance of 500,000 shares of Common Stock to Jane Founder")
    section: Terms
  - name: approving_percentage
    type: string
    description: The percentage of outstanding voting stock signing this consent, computed excluding the putative shares being ratified (for example, "a majority")
    section: Deal Terms
  - name: stockholder_signatories
    type: array
    description: Stockholders signing the consent
    section: Signatures
    items:
      - name: name
        type: string
        description: Full name of a stockholder signing the consent
priority_fields:
  - company_name
  - board_consent_reference
  - defective_acts
  - stockholder_signatories
