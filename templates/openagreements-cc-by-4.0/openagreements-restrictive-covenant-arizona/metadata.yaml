name: OpenAgreements Employee Restrictive Covenant (Arizona)
category: non-compete
description: 'Arizona-specific employee restrictive covenant agreement built for Arizona''s common-law reasonableness regime: there is no general Arizona non-compete statute, so every post-employment restraint stands or falls on Arizona''s reasonableness test — a restriction is unreasonable and will not be enforced if it is greater than necessary to protect the employer''s legitimate interest, or if that interest is outweighed by hardship to the employee and likely injury to the public. It provides confidentiality and trade-secret protection backstopped by the Arizona Uniform Trade Secrets Act (A.R.S. §§ 44-401 to 44-407), a continued-at-will-employment consideration recital, customer and employee non-solicitation drawn to the protectable-interest threshold, an optional non-compete sized to the actual footprint, confidentiality and non-solicits scoped so they do not operate as de-facto non-competes, a broadcast-employer screening recital for the one statutory ban (A.R.S. § 23-494), physician covenants drafted for Arizona''s heightened public-interest scrutiny, and grammatically severable covenant drafting for Arizona''s strict trim-only blue pencil, which strikes overbroad terms but never rewrites them. Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-arizona
version: 0.1.0
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Arizona-specific analysis informed by the quote-verified Arizona practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: Governing law state
    display_label: Governing Law
    section: Legal
    default: Arizona
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    rationale_source: editorial
    default_value_rationale: Arizona sets no statutory cap, but an unlimited confidentiality covenant reaching non-secret information has been held unenforceable as the equivalent of a geographically unrestricted non-compete, so ordinary confidential information carries a finite term. 24 months is a common, conservative duration for non-trade-secret confidentiality obligations that counsel should size to the information actually protected.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee non-solicitation covenant is included
    display_label: Employee Non-Solicitation Included
    default: true
    section: Employee Non-Solicitation
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    section: Employee Non-Solicitation
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/employee-non-solicit-duration
    default_value_rationale: Arizona sets no statutory cap on duration; enforceability turns on the common-law reasonableness test and, because anti-piracy covenants face the same no-broader-than-necessary test as non-competes, on the employer's actual protectable interest. 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; 12 months is the common lighter alternative, sized to the workforce relationships actually protected.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for employee non-solicitation scope.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the customer/partner non-solicitation covenant is included
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/customer-non-solicit-duration
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common customer non-solicit term in benchmarked, publicly-filed employee agreements, edging out 24 months by only a narrow margin. Arizona sets no statutory cap; a customer non-solicit maps onto the customer-goodwill interest but is enforceable only as far as the employer's protectable interest in the specific relationships reaches, so counsel should size the term to the actual customer relationships protected.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope.
  - name: noncompete_included
    type: boolean
    description: Whether the non-competition covenant is included. Arizona has no general non-compete statute; a non-compete is enforceable only to the extent it satisfies the Farber reasonableness test and is tied to a legitimate protectable interest rather than ordinary competition. Because Arizona's blue pencil is strictly trim-only, an overbroad covenant is struck rather than rewritten, so this template recites the protectable-interest basis and sizes the restraint to the employer's actual footprint from the start.
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    default_value_rationale: Conservative default. The non-compete is the most heavily scrutinized covenant under the Farber test, and Arizona disfavors restraints on pursuing a similar vocation. A customer non-solicit backstopped by the Arizona Uniform Trade Secrets Act often protects the employer as well. Include only after confirming an identified protectable interest (confidential information, trade secrets, or customer goodwill) and sizing the duration, territory, and activity scope to the actual footprint, because no Arizona court will pare an overbroad covenant back to a lawful size.
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/non-compete-duration
    section: Non-Competition
    default_value_rationale: 12 months matches the modal non-compete term observed in benchmarked, publicly-filed employee agreements — a common, conservative pick rather than an Arizona ceiling (Arizona imposes no statutory cap on duration). Courts weigh time, territory, and activity together against the employer's real protectable interest under Farber, so there is no safe-harbor number; counsel should size the default to the actual role and market rather than copy from another form, mindful that the strict blue pencil means an unreasonable duration is struck, not shortened.
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee provided services
    section: Non-Competition
    default_value_rationale: Tied to the employee's actual service area. Arizona imposes no statutory cap on territory; a narrower area genuinely needed to protect customer relationships or confidential information is far easier to defend under Farber than a statewide ban, and because an Arizona court strikes an overbroad territory rather than shrinking it, the map must match the protectable interest from the start.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. Narrowing the restriction to named competitors strengthens enforceability.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the standard passive investment carveout across restrictive covenant agreements.
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
priority_fields:
  - employer_name
  - employee_name
