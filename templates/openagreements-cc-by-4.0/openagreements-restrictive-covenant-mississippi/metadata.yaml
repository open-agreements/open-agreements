name: Employee Restrictive Covenant (Mississippi)
category: non-compete
description: 'Mississippi-specific employee restrictive covenant agreement built for Mississippi''s common-law reasonableness regime: there is no general Mississippi non-compete statute, so every post-employment restraint stands or falls on the three-interest reasonableness balance the courts weigh — the rights of the employer, the rights of the employee, and the rights of the public — with the enforcing employer carrying the burden and the disfavored covenant construed strictly against the drafter. It provides confidentiality and trade-secret protection independent of any covenant, a continued-at-will-employment consideration recital, customer and employee non-solicitation, an optional non-dealing covenant using the express no-acceptance language a customer-facing restraint needs, an optional non-compete tied to a legitimate protectable interest and sized to the employee''s real influence, an express extension-on-breach tolling clause because Mississippi courts do not extend the restricted period on their own but give an express extension clause effect, express and pre-departure assignment to successors, a no-enforcement term for covenants invoked after an arbitrary, capricious, or bad-faith termination, a lawyer practice-restriction exclusion (Miss. R. Prof''l Conduct 5.6), and discretionary equitable reformation that the drafting does not rely on. Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-mississippi
version: 0.1.0
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Mississippi-specific analysis informed by the quote-verified Mississippi practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: Governing law state. For a Mississippi workforce this should ordinarily remain Mississippi. The sourced Mississippi practice note identifies no choice-of-law or forum-selection authority specific to these covenants, so treat any out-of-state selection in a Mississippi employment relationship as a counsel-review decision rather than assuming how a court would resolve it.
    display_label: Governing Law
    section: Legal
    default: Mississippi
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    default_value_rationale: 24 months is common for non-trade-secret confidentiality obligations in employment agreements. Mississippi weighs a perpetual lid on ordinary business information against the employee's freedom to work, so a finite term is safer than an indefinite one.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee non-solicitation covenant is included
    display_label: Employee Non-Solicitation Included
    default: true
    section: Employee Non-Solicitation
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/employee-non-solicit-duration
    section: Employee Non-Solicitation
    default_value_rationale: Mississippi sets no statutory cap on duration, and no staged Mississippi authority speaks specifically to employee no-poach covenants, so this restraint stands on ordinary reasonableness under the Texas Road Boring three-interest balance. 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; 12 months is the common lighter alternative, and counsel should size the term to the employer's actual protectable interest.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for employee non-solicitation scope.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the customer/partner non-solicitation covenant is included
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/customer-non-solicit-duration
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common customer non-solicit term in benchmarked, publicly-filed employee agreements, edging out 24 months by only a narrow margin. Mississippi sets no statutory cap; a customer non-solicit maps directly onto the customer-goodwill interest and is often the employer's sturdiest restraint here, because Mississippi recognizes that a properly drafted clause reaching former customers can be reasonable and enforceable (Kennedy). Counsel should size the term to the actual customer relationships protected.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope.
  - name: noncompete_included
    type: boolean
    description: Whether the non-competition covenant is included. Mississippi has no general non-compete statute; a non-compete is disfavored, construed strictly against the employer, and enforceable only if the employer proves it reasonable in duration, territory, and restrained activity under the three-interest balance (Texas Road Boring) and tied to a legitimate protectable interest rather than ordinary competition. This template recites the protectable-interest basis and sizes the restraint to the employee's real influence.
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    default_value_rationale: Conservative default. The non-compete is the most heavily scrutinized covenant under the Texas Road Boring reasonableness balance; a customer non-solicit backstopped by trade-secret protection often protects the employer as well. Include only after confirming a legitimate protectable interest (confidential information, trade secrets, or customer goodwill) and sizing the duration and territory to the employee's real influence rather than the employer's whole footprint.
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/non-compete-duration
    section: Non-Competition
    default_value_rationale: 12 months matches the modal non-compete term observed in benchmarked, publicly-filed employee agreements — a common, conservative pick rather than a Mississippi ceiling (Mississippi imposes no statutory cap on duration). Courts weigh time, territory, and activity together under the three-interest balance, so there is no safe-harbor number; counsel should size the default to the actual role and market rather than copy from another form. Note that the restricted period runs from the contractual termination date and a court will not extend it at the back end absent an express extension clause (Frierson).
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee provided services
    section: Non-Competition
    default_value_rationale: 'Tied to the employee''s actual service area. Mississippi imposes no statutory cap on territory but measures scope against the employee''s real influence: a statewide restraint failed where the employee''s protectable relationships were local (Heatherly), while a 250-mile radius held for a telephonic business whose market would have justified even a nationwide limit (Timber Lake). A narrower area genuinely needed to protect customer relationships or confidential information is far easier to defend than a statewide ban.'
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. Narrowing the restriction to named competitors strengthens enforceability.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/passive-ownership-carveout
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the modal passive-investment carve-out threshold observed in benchmarked, publicly-filed employee agreements that include the carve-out (lower 1-3 percent thresholds are the common tighter alternatives).
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
priority_fields:
  - employer_name
  - employee_name
