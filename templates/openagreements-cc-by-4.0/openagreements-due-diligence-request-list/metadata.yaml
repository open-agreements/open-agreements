name: OpenAgreements Legal Due Diligence Request List
category: deals-partnerships
description: 'Modular legal due diligence request list (DDRL) for corporate transactions. Ships a base form covering organization, capitalization, contracts, IP, employment, litigation, compliance, tax, insurance, debt, property, and privacy/cybersecurity. Four optional industry riders gate via boolean toggles: tech / SaaS, life sciences, healthcare provider, and cross-border / trade compliance. Drafted clean-room from public-source consensus across 15 Am Law firm, bar association, and legal publisher DDRLs; no public source language is reused.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-due-diligence-request-list
version: '1.0'
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Category structure and consensus framing informed by publicly available DDRLs and commentary from Cooley, Skadden, Morgan Lewis, Gunderson Dettmer, Lowenstein Sandler, Holland & Knight, Foley & Lardner, Software Equity Group, the International Bar Association, the American Bar Association, Bass Berry & Sims, and Carta. See practice note for sources. Drafted clean-room; no source language was reused. Licensed under CC BY 4.0.
omitted_clauses: drop
fields:
  - name: requesting_firm_name
    type: string
    description: Legal name of the buyer's law firm sending the request
    section: Cover Sheet
  - name: target_company_name
    type: string
    description: Legal name of the target company receiving the request
    section: Cover Sheet
  - name: project_code_name
    type: string
    description: Project code name or pseudonym used to refer to the transaction
    default: ''
    section: Cover Sheet
  - name: request_date
    type: date
    description: Date the request list is delivered to the target
    section: Cover Sheet
  - name: response_due_date
    type: date
    description: Date by which the target's first-round response is due
    section: Cover Sheet
  - name: lead_buyer_counsel_name
    type: string
    description: Name of the lead attorney at the requesting firm
    section: Cover Sheet
  - name: lead_buyer_counsel_email
    type: string
    description: Email of the lead attorney at the requesting firm
    section: Cover Sheet
  - name: primary_target_contact_name
    type: string
    description: Name of the target's primary point of contact for diligence responses
    section: Cover Sheet
  - name: currency
    type: enum
    description: Currency for materiality and financial threshold inputs
    options:
      - USD
      - EUR
      - GBP
      - CAD
      - Other
    default: USD
    section: Cover Sheet
  - name: materiality_threshold_usd
    type: string
    description: Dollar floor for material-contracts requests. Stored as a pre-formatted string (e.g., "$100,000") because the fill engine has no currency formatter. Adjust upward for larger deals, downward for early-stage targets.
    default: $100,000
    default_value_rationale: $100,000 is the consensus dollar floor for mid-market deals across public DDRLs (Cooley, Skadden, Bloomberg). Tune up for larger targets (e.g., "$1,000,000" for $100M+ deals) or down for early-stage.
    section: Materiality and Lookback
  - name: materiality_threshold_revenue_pct
    type: string
    description: Relative materiality threshold expressed as a percentage of gross revenue. The lower of dollar floor and revenue percentage governs. Stored as a pre-formatted string for consistency with the dollar threshold.
    default: 5%
    default_value_rationale: 5% of gross revenue is the consensus relative-materiality qualifier in BigLaw practice. Tune down for asset-light targets where individual contract size is small but each one is operationally critical.
    section: Materiality and Lookback
  - name: lookback_years
    type: number
    description: Lookback window in years applied across litigation, compliance, and operational history. A few sections state their own fixed period in the prose (tax is 6 years; regulatory investigations, settlements, and consent decrees are open-ended).
    default: 3
    default_value_rationale: 3 years is consensus baseline for litigation, compliance, and operational history. Tax often warrants 6+ to track the IRS statute of limitations; regulatory correspondence is conventionally open-ended.
    section: Materiality and Lookback
  - name: tech_rider_enabled
    type: boolean
    description: Enable Section P (Tech / SaaS rider) covering OSS schedules with copyleft flagging, source-code escrow, hosted-services agreements, SOC 2 / ISO 27001 audits, data-flow architecture, SLAs, security- incident history, and cloud-agreement change-of-control. Recommended on for software, SaaS, platform, marketplace, or data-heavy targets.
    default: false
    section: Industry Riders
  - name: life_sciences_rider_enabled
    type: boolean
    description: Enable Section Q (Life Sciences rider) covering FDA correspondence, clinical trials, CRO agreements, Form 483s, Warning Letters, CIA, and controlled-substance registrations. Recommended on for biotech, pharma, medical-device, and diagnostics targets with FDA-regulated pipelines.
    default: false
    section: Industry Riders
  - name: healthcare_provider_rider_enabled
    type: boolean
    description: Enable Section R (Healthcare Provider rider) covering HIPAA breach logs, billing/coding compliance, payer audits, malpractice claims, and Anti-Kickback / Stark / Sunshine Act compliance. Recommended on for clinics, hospitals, physician groups, and telehealth providers with payer-reimbursement exposure.
    default: false
    section: Industry Riders
  - name: cross_border_rider_enabled
    type: boolean
    description: Enable Section S (Cross-Border / Trade Compliance rider) covering sanctions/OFAC screening, export-control classifications, AML/KYC, FCPA compliance, government-customer exposure, and foreign-investment- screening filings. Recommended on whenever the target has foreign subsidiaries, foreign customers, government customers, or sensitive- jurisdiction exposure. Increasingly mandatory after the 2023 DOJ M&A Safe Harbor Policy.
    default: false
    section: Industry Riders
priority_fields:
  - target_company_name
  - requesting_firm_name
  - tech_rider_enabled
  - life_sciences_rider_enabled
  - healthcare_provider_rider_enabled
  - cross_border_rider_enabled
  - materiality_threshold_usd
  - lookback_years
