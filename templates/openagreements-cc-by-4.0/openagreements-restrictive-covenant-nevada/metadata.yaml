name: Employee Restrictive Covenant (Nevada)
category: non-compete
description: 'Nevada-specific employee restrictive covenant agreement built for NRS 613.195 and NRS 613.200: confidentiality and trade-secret protection kept inside the NRS 613.200(4) safe harbor, customer and employee non-solicitation, an optional non-compete drawn to the NRS 613.195(1) four-part validity test with the categorical exclusion of solely hourly-paid workers, the volunteer-customer service carve-out, the post-restructuring continued-pay condition, an acknowledgement of Nevada''s mandatory judicial revision regime, and express-consent mechanics for an asset-sale assignment. Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-nevada
version: 0.1.0
stability: experimental
license: CC-BY-4.0
allow_derivatives: true
attribution_text: Authored by OpenAgreements contributors. Nevada-specific analysis informed by the quote-verified Nevada practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: Governing law state
    display_label: Governing Law
    section: Legal
    default: Nevada
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    default_value_rationale: A finite term for non-trade-secret information helps keep the post-termination confidentiality covenant reasonable in scope and duration, as the NRS 613.200(4) safe harbor requires. 24 months is common for non-trade-secret confidentiality obligations in employment agreements.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee no-hire / non-solicitation covenant is included.
    display_label: Employee No-Hire Included
    section: Employee Non-Solicitation
    rationale_source: editorial
    default: true
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/employee-non-solicit-duration
    section: Employee Non-Solicitation
    default_value_rationale: Nevada does not fix a statutory duration for employee non-solicitation, so the covenant is judged on ordinary reasonableness. 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; 12 months is the common lighter alternative that a court has little reason to revise down.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for employee non-solicitation scope.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the current-customer non-solicitation covenant is included.
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
    rationale_source: editorial
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/customer-non-solicit-duration
    section: Customer Non-Solicitation
    default_value_rationale: No Nevada statute fixes a duration for customer non-solicitation; 12 months is the lighter side of the near-even 12/24-month split observed in benchmarked, publicly-filed employee agreements, drawn to the employer's actual customer relationships, and the volunteer-customer carve-out limits its reach regardless of duration.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope.
  - name: noncompete_included
    type: boolean
    description: Whether the non-competition covenant is included. Under NRS 613.195(1) a Nevada non-compete is void and unenforceable unless it is supported by valuable consideration, imposes no restraint greater than required for the employer's protection, imposes no undue hardship on the employee, and imposes restrictions appropriate in relation to the consideration; it may not apply at all to a worker paid solely on an hourly wage basis (NRS 613.195(3)).
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    default_value_rationale: Conservative default. Non-competes are the most heavily scrutinized covenant; include only after confirming the NRS 613.195(1) four-part test is satisfied, the worker is not paid solely on an hourly wage basis (NRS 613.195(3)), and the customer-facing scope preserves the NRS 613.195(2) volunteer-customer carve-out.
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/non-compete-duration
    section: Non-Competition
    default_value_rationale: Nevada fixes no statutory duration ceiling; the statute authorizes a court to revise an unreasonable time limit down to reasonableness, so the duration should be drawn within the enforceable range at the outset. 12 months matches the modal non-compete term observed in benchmarked, publicly-filed employee agreements and is a common enforceable term for a former-employee non-compete.
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee provided services
    section: Non-Competition
    default_value_rationale: Tied to the employee's actual service area. A narrower geographic scope is more readily found to impose no greater restraint than required under NRS 613.195(1)(b), and gives a revising court under NRS 613.195(6) little to cut.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. Narrowing the restriction to named competitors strengthens enforceability.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: nevada_consideration
    type: string
    description: Nevada only. The valuable consideration given in exchange for the restrictive covenants, recited so the covenant satisfies Nevada's valuable-consideration requirement and so the restrictions can be measured as appropriate in relation to that consideration under Nevada's statutory proportionality test. Continued at-will employment is sufficient consideration at common law, but no Nevada appellate decision squarely decides whether continued employment alone satisfies the statutory proportionality test for a severe restriction, so state the specific benefit here (for example, a signing or retention bonus, equity grant, or promotion) where the restraint is significant. Shown in the Nevada timing and consideration recital.
    display_label: Consideration for Restrictive Covenants (Nevada)
    default: the compensation, access to Confidential Information, and other benefits Employer provides to Employee under this agreement, which the parties agree are given in exchange for, and are appropriate in relation to, the restrictive covenants
    section: Consideration
    rationale_source: legislation
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.nevada.satisfy-four-part-statutory-validity-test
    default_value_rationale: The default recites the access-to-confidential-information and compensation the agreement itself provides and ties them to the covenants, addressing Nevada's valuable-consideration and proportionality conditions. Counsel should replace it with the specific negotiated benefit where the restraint is significant.
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
    rationale_source: editorial
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/passive-ownership-carveout
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the modal passive-investment carve-out threshold observed in benchmarked, publicly-filed employee agreements that include the carve-out (lower 1-3 percent thresholds are the common tighter alternatives), and keeps ordinary public-share ownership off Nevada's undue-hardship scale.
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
    rationale_source: editorial
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
omitted_clauses: drop
priority_fields:
  - employer_name
  - employee_name
distribution: bundled
artifact_type: template
