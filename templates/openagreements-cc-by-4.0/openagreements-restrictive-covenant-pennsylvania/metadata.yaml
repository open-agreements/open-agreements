name: Employee Restrictive Covenant (Pennsylvania)
category: non-compete
description: 'Pennsylvania-specific employee restrictive covenant agreement built for Pennsylvania''s common-law reasonableness regime: there is no general Pennsylvania non-compete statute, so every post-employment restraint stands or falls on Pennsylvania''s four-part common-law test — ancillary to an employment relationship, supported by adequate consideration, reasonably limited in duration and geography, and tied to a legitimate protectable interest. It provides confidentiality and trade-secret protection, a new-consideration recital for a covenant signed after employment begins that does not lean on a Uniform Written Obligations Act recital, customer and employee non-solicitation drafted as affirmative-outreach restraints with a geographic limit, an optional non-compete tied to identified protectable interests and sized to the actual footprint under close scrutiny, a health care practitioner clause reflecting the Fair Contracting for Health Care Practitioners Act (Act 74 of 2024) one-year cap, dismissal rule, and 90-day patient-notice duty, an express assignability provision the covenant needs to reach a buyer, and separable, tiered restraints that do not rely on discretionary judicial reformation. Drafted as a starting point for licensed counsel review.'
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-pennsylvania
version: 0.1.0
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Pennsylvania-specific analysis informed by the quote-verified Pennsylvania practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: Governing law state
    display_label: Governing Law
    section: Legal
    default: Pennsylvania
  - name: new_consideration_description
    type: string
    description: The new and valuable consideration supporting the covenants where this agreement is signed after employment has already begun (for example, a signing bonus, raise, promotion, or other beneficial change in employment status). Continued at-will employment alone is not adequate consideration for a mid-employment covenant in Pennsylvania.
    display_label: New Consideration for a Mid-Employment Covenant
    default: ''
    section: Timing
    rationale_source: case_law
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.pennsylvania.provide-new-consideration-for-post-hire-covenants
    default_value_rationale: Empty by default because a covenant signed at the outset of employment is supported by the offer and commencement of employment and needs no separate new consideration. A covenant an existing at-will employee signs after employment began requires new and valuable consideration beyond continued employment; if this agreement is signed mid-employment, counsel must record the specific benefit actually delivered here.
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    default_value_rationale: 24 months is common for non-trade-secret confidentiality obligations in employment agreements.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee non-solicitation covenant is included
    display_label: Employee Non-Solicitation Included
    default: true
    section: Employee Non-Solicitation
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/employee-non-solicit-duration
    section: Employee Non-Solicitation
    default_value_rationale: Pennsylvania sets no statutory cap on duration; enforceability turns on the four-part Socko reasonableness test rather than a fixed number. 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; 12 months is the common lighter alternative, and counsel should size the term to the employer's actual protectable interest.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for employee non-solicitation scope.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the customer/partner non-solicitation covenant is included
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/customer-non-solicit-duration
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common customer non-solicit term in benchmarked, publicly-filed employee agreements, edging out 24 months by only a narrow margin. Pennsylvania sets no statutory cap; a customer non-solicit maps directly onto the customer-goodwill interest and is often the better instrument than a full non-compete, so counsel should size the term to the actual customer relationships protected.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope.
  - name: noncompete_included
    type: boolean
    description: Whether the non-competition covenant is included. Pennsylvania has no general non-compete statute; a non-compete is enforceable only to the extent it satisfies Pennsylvania's four-part reasonableness test and is tied to a legitimate protectable interest rather than ordinary competition. This template recites the protectable-interest basis and sizes the restraint to the employer's actual footprint. A non-compete against a covered health care practitioner is separately limited by the Fair Contracting for Health Care Practitioners Act.
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    rationale_source: editorial
    default_value_rationale: Conservative default. The non-compete is the most heavily scrutinized covenant under Pennsylvania's four-part test; a customer non-solicit backstopped by trade-secret protection often protects the employer as well. Include only after confirming an identified protectable interest (confidential information, trade secrets, or customer goodwill), sizing the duration and territory to the actual footprint, and confirming the worker is not a health care practitioner covered by the Fair Contracting for Health Care Practitioners Act.
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/non-compete-duration
    section: Non-Competition
    default_value_rationale: 12 months matches the modal non-compete term observed in benchmarked, publicly-filed employee agreements — a common, conservative pick rather than a Pennsylvania ceiling (Pennsylvania imposes no statutory cap for the ordinary workforce). Courts weigh time and territory together against the employer's real protectable interest under Socko and Sidco, so there is no safe-harbor number; counsel should size the default to the actual role and market. For a covered health care practitioner, Act 74 caps any enforceable non-compete at one year and voids it entirely if the employer dismissed the practitioner.
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee provided services
    section: Non-Competition
    default_value_rationale: Tied to the employee's actual service area. Pennsylvania imposes no statutory cap on territory; a narrower area genuinely needed to protect customer relationships or confidential information is far easier to defend under the Socko and Sidco reasonableness analysis than a statewide ban, and an overbroad territory invites a court to enforce less than the employer drafted, or nothing at all.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. Narrowing the restriction to named competitors strengthens enforceability.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    rationale_source: benchmark
    benchmark_ref: restrictive-covenant/passive-ownership-carveout
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the modal passive-investment carve-out threshold observed in benchmarked, publicly-filed employee agreements that include the carve-out (lower 1-3 percent thresholds are the common tighter alternatives).
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
priority_fields:
  - employer_name
  - employee_name
