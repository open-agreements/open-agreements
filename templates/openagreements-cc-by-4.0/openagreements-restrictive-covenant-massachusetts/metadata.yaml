name: OpenAgreements Employee Restrictive Covenant (Massachusetts)
category: non-compete
description: Massachusetts-specific employee restrictive covenant agreement with modular covenant structure (non-compete, non-solicitation, non-dealing, non-investment, confidentiality, non-disparagement). Implements the Massachusetts Noncompetition Agreement Act, Mass. Gen. Laws ch. 149, § 24L (garden-leave or other agreed consideration, 12-month duration cap, formation-timing and notice requirements, excluded-worker categories, choice-of-law and § 24L(f) venue limits, and discretionary judicial reformation), and the profession-specific bans of Mass. Gen. Laws ch. 112, §§ 12X/74D/129B/135C and ch. 149, § 186. Generated by projecting the OpenAgreements restrictive covenant master to the Massachusetts overlay; drafted as a starting point for licensed counsel review.
source_url: https://github.com/open-agreements/open-agreements/tree/main/templates/openagreements-restrictive-covenant-massachusetts
version: '1.0'
stability: experimental
license: CC-BY-4.0
allow_derivatives: true
distribution: bundled
artifact_type: template
attribution_text: Authored by OpenAgreements contributors. Massachusetts-specific analysis informed by the quote-verified openagreements.org/legal/non-compete/massachusetts practice note. Licensed under CC BY 4.0.
fields:
  - name: employer_name
    type: string
    description: Legal name of the employer
    display_label: Employer
    section: Parties
  - name: employer_signatory_name
    type: string
    description: Full name of the authorized signatory signing for the employer
    display_label: Employer Signatory Name
    section: Parties
  - name: employer_signatory_title
    type: string
    description: Title of the authorized signatory signing for the employer
    display_label: Employer Signatory Title
    section: Parties
  - name: employee_name
    type: string
    description: Full legal name of the employee
    display_label: Employee
    section: Parties
  - name: employee_title
    type: string
    description: Employee job title or position (optional)
    display_label: Employee Title / Position
    default: ''
    section: Parties
  - name: effective_date
    type: date
    description: Effective date of this agreement
    display_label: Effective Date
    section: Timing
  - name: governing_law
    type: string
    description: Governing law state
    display_label: Governing Law
    section: Legal
    default: Massachusetts
  - name: confidentiality_trade_secret_duration
    type: string
    description: Duration of confidentiality obligations for trade secrets
    display_label: Trade Secrets Duration
    default: Perpetual
    section: Confidentiality
  - name: confidentiality_other_duration
    type: string
    description: Duration of confidentiality obligations for non-trade-secret information
    display_label: Other Confidential Information Duration
    default: 24 months
    section: Confidentiality
    default_value_rationale: 24 months is common for non-trade-secret confidentiality obligations in employment agreements.
  - name: employee_nonsolicit_included
    type: boolean
    description: Whether the employee non-solicitation covenant is included
    display_label: Employee Non-Solicitation Included
    default: true
    section: Employee Non-Solicitation
  - name: employee_nonsolicit_duration
    type: string
    description: Duration of employee non-solicitation restriction
    display_label: Employee Non-Solicitation Duration
    default: 24 months
    section: Employee Non-Solicitation
    rationale_source: editorial
    default_value_rationale: 24 months matches the modal employee non-solicit term observed in benchmarked, publicly-filed employee agreements; 12 months is the common lighter alternative. A Massachusetts employee non-solicitation covenant is judged for reasonableness and falls outside the Noncompetition Agreement Act; a duration tied to the employer's actual interest is more readily upheld.
  - name: covered_employee_period
    type: string
    description: Lookback period for determining which employees are covered by the non-solicitation restriction.
    display_label: Covered Employee Period
    default: 12 months
    section: Employee Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for employee non-solicitation scope.
  - name: customer_nonsolicit_included
    type: boolean
    description: Whether the customer/partner non-solicitation covenant is included
    display_label: Customer Non-Solicitation Included
    default: true
    section: Customer Non-Solicitation
  - name: customer_nonsolicit_duration
    type: string
    description: Duration of customer/partner non-solicitation restriction
    display_label: Customer Non-Solicitation Duration
    default: 12 months
    section: Customer Non-Solicitation
    rationale_source: editorial
    default_value_rationale: 12 months is a common, readily enforceable starting point. A customer non-solicitation term is judged for reasonableness rather than capped by statute; adjust it to the employer's actual customer relationships.
  - name: covered_customer_period
    type: string
    description: Lookback period for determining which customers are covered by the non-solicitation and non-dealing restrictions.
    display_label: Covered Customer Period
    default: 12 months
    section: Customer Non-Solicitation
    default_value_rationale: 12 months is the most common lookback period for customer non-solicitation scope.
  - name: noncompete_included
    type: boolean
    description: 'Whether the non-competition covenant is included. A Massachusetts non-compete is governed by the Noncompetition Agreement Act: enforceable only if no broader than necessary to protect a legitimate business interest, supported by a garden-leave payment or other mutually-agreed consideration, and reasonable in duration, geography, and scope. The operative clauses carry the precise statutory subsection cites.'
    display_label: Non-Competition Included
    default: false
    section: Non-Competition
    rationale_source: editorial
    default_value_rationale: 'Conservative default: the non-compete is the most heavily scrutinized covenant, is unenforceable against several protected worker categories, and is void for physicians. Include it only after confirming the statutory eligibility, formation, and consideration requirements are met.'
  - name: noncompete_duration
    type: string
    description: Duration of non-competition restriction
    display_label: Non-Competition Duration
    default: 12 months
    section: Non-Competition
    rationale_source: legislation
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.massachusetts.cap-restricted-period-at-twelve-months
    default_value_rationale: The default is the statutory maximum restricted period; two years is available only on the misconduct exception. The tool must not default above the cap.
  - name: territory
    type: string
    description: Geographic scope of the non-competition restriction
    display_label: Restricted Territory
    default: the geographic area in which Employee provided services
    section: Non-Competition
    rationale_source: legislation
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.massachusetts.keep-reach-scope-and-effect-reasonable
    default_value_rationale: Tied to the employee's actual service area. Under the Massachusetts Noncompetition Agreement Act a non-compete's geographic reach is presumptively reasonable when limited to areas where the employee provided services or had a material presence in the last two years.
  - name: competitive_business_definition
    type: string
    description: Description of the business activities that constitute competition with the employer.
    display_label: Competitive Business
    section: Non-Competition
  - name: specified_competitors
    type: string
    description: Optional named list of specific competitors. Narrowing the restriction to named competitors strengthens enforceability.
    display_label: Specified Competitors
    default: ''
    section: Non-Competition
  - name: ma_noncompete_consideration
    type: string
    description: Massachusetts only. The garden leave clause or other mutually-agreed upon consideration that supports the non-compete, stated in the agreement as required by the Massachusetts Noncompetition Agreement Act. A qualifying garden leave clause pays Employee, on a pro-rata basis during the entire restricted period, at least 50 percent of Employee's highest annualized base salary paid within the 2 years before termination. Whether a smaller fixed payment qualifies as "other mutually-agreed upon consideration" is unsettled, so size it conservatively against the garden-leave benchmark and specify the amount here. Shown in Cover Terms and recited in the garden-leave/consideration clause only when noncompete_included is true under the Massachusetts projection.
    display_label: Garden Leave or Agreed Consideration (Massachusetts)
    default: garden leave equal to at least 50% of Employee's highest annualized base salary paid within the two years before termination, paid pro rata across the Restricted Period
    section: Non-Competition
    rationale_source: legislation
    requirement_id: REQ-labor-and-employment-law.restrictive-covenant-agreement.massachusetts.require-garden-leave-or-agreed-consideration
    default_value_rationale: The 50%-of-base-salary garden leave clause is the only consideration the Noncompetition Agreement Act defines, so it is the conservative default. Counsel should confirm the amount and may substitute other mutually-agreed upon consideration sized against this benchmark; the enforceability of a smaller fixed sum is unsettled.
  - name: nondealing_included
    type: boolean
    description: Whether the no-business-with-covered-customers covenant is included.
    display_label: No Business with Covered Customers Included
    default: false
    section: No Business with Covered Customers
  - name: nondealing_duration
    type: string
    description: Duration of the no-business-with-covered-customers restriction
    display_label: No Business with Covered Customers Duration
    default: 12 months
    section: No Business with Covered Customers
  - name: passive_public_holdings_threshold
    type: string
    description: Maximum ownership percentage of publicly traded securities permitted under the Passive Public Holdings carveout.
    display_label: Passive Public Holdings Threshold
    default: five percent
    section: Definitions
    default_value_rationale: Five percent of any class of publicly traded securities is the standard passive investment carveout across restrictive covenant agreements.
  - name: noninvestment_included
    type: boolean
    description: Whether the non-investment covenant is included.
    display_label: Non-Investment Included
    default: false
    section: Non-Investment
  - name: noninvestment_duration
    type: string
    description: Duration of non-investment restriction
    display_label: Non-Investment Duration
    default: 12 months
    section: Non-Investment
  - name: nondisparagement_duration
    type: string
    description: Duration of non-disparagement obligation (measured from termination)
    display_label: Non-Disparagement Duration
    default: 24 months
    section: Non-Disparagement
    default_value_rationale: 24 months is common for employment non-disparagement provisions.
priority_fields:
  - employer_name
  - employee_name
omitted_clauses: drop
