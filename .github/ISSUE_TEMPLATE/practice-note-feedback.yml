name: Practice note feedback
description: Share feedback on a published practice-note page — a correction, a suggestion, a question, or anything we could improve. All feedback is welcome and helps us get it right.
title: "Practice note feedback: "
labels:
  - area/practice-notes
body:
  - type: markdown
    attributes:
      value: |
        Triage notes:
        - Set issue Type to `Bug` for factual errors or broken citations; `Feature` for stale-law updates requiring a content rewrite.
        - Maintainers assign `area/practice-notes`, `priority/*`, and `status/*` labels during triage.
        - Keep Assignees, Projects, and Milestone empty unless ownership / scheduling is explicit.

  - type: input
    id: page_url
    attributes:
      label: Page URL
      placeholder: https://legal-explainer.vercel.app/legal/non-compete/wyoming
    validations:
      required: true

  - type: input
    id: section
    attributes:
      label: Question / section
      placeholder: e.g., "Are employee non-compete agreements enforceable in Wyoming?" or "Authority A.4"
    validations:
      required: false

  - type: textarea
    id: issue
    attributes:
      label: Your feedback
      description: What did you notice? A factual correction, a suggestion, a question, or anything that could be clearer — whatever it is, we're glad to hear it.
    validations:
      required: true

  - type: textarea
    id: suggested_correction
    attributes:
      label: Suggested change (optional)
    validations:
      required: false

  - type: textarea
    id: source_backing
    attributes:
      label: Source / authority (if relevant)
      placeholder: Statute citation, case citation, link to law-firm commentary, etc.
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Type of feedback
      options:
        - Factual error (legal substance)
        - Citation is broken or wrong
        - Stale (law has changed)
        - Copy / phrasing
        - Suggestion / general feedback
        - Other
    validations:
      required: false
