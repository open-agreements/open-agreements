---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ./.github/workflows/semgrep.yml

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Build
        run: npm run build

      - uses: github/codeql-action/analyze@v3

  template-preview-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Validate template preview PNGs
        run: npm run check:template-previews

      - name: Validate DOCX structure
        run: npm run check:docx-structure

  preview-freshness-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      # The changed-file list rides in a file, not an env var: sync PRs can
      # touch 1,400+ files (~164 KB of JSON), which overflows the 128 KiB
      # per-string execve limit and kills the step with "Argument list too
      # long" before the check runs (open-agreements#603).
      - name: Collect changed files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            fs.writeFileSync(
              path.join(process.env.RUNNER_TEMP, 'oa-changed-files.json'),
              JSON.stringify(files.map((f) => ({
                status: f.status,
                path: f.filename,
                previousPath: f.previous_filename ?? null,
              })))
            );

      - name: Validate preview freshness
        env:
          OA_CHANGED_FILES_PATH: ${{ runner.temp }}/oa-changed-files.json
          OA_GATE_REQUIRE_INPUT: "1"
          OA_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: npm run check:preview-freshness

  gemini-extension-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Validate Gemini extension manifest contract
        run: npm run check:gemini-extension-manifest

  claude-plugin-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Validate Claude marketplace package allowlist and drift
        run: npm run check:claude-plugin

      - name: Test Claude marketplace package security boundary
        run: npx vitest run scripts/sync_claude_marketplace_plugin.test.mjs

  readme-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Validate generated README freshness
        run: npm run check:readme

      - name: Validate generated llms.txt freshness
        run: npm run check:llms

  isolated-runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Verify isolated package runtime behavior
        run: npm run check:isolated-runtime

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

      # Reused by the deploy-allure job (main-only) so it doesn't re-run vitest.
      # Node-20 leg only: upload-artifact@v4 rejects duplicate names across matrix legs.
      - name: Upload Allure results
        if: matrix.node-version == 20 && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: warn
          retention-days: 1

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Test coverage + JUnit results
        run: npm run test:coverage:ci

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          use_oidc: true
          fail_ci_if_error: true

      # Tokenless/OIDC-first upload.
      # If org policy changes, configure CODECOV_TOKEN as a repository secret.
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: codecov/test-results-action@v1
        with:
          files: ./coverage/junit.xml
          use_oidc: true
          fail_ci_if_error: true

  deploy-allure:
    if: github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TESTS_OPENAGREEMENTS }}
      VERCEL_DEPLOY_ENABLED: >-
        ${{
          secrets.VERCEL_TOKEN != '' &&
          secrets.VERCEL_ORG_ID != '' &&
          secrets.VERCEL_PROJECT_ID_TESTS_OPENAGREEMENTS != ''
        }}
    concurrency:
      group: deploy-allure-vercel
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      # Reuse the test job's results instead of re-running vitest here — the second
      # run was the source of an intermittent ESM transform race that reddened main.
      # continue-on-error: a missing artifact must not fail this (correctness was
      # already gated by `needs: [test]`); use `outcome` (pre-continue-on-error) below.
      - name: Download Allure results
        id: allure-results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Warn if Allure results unavailable
        if: steps.allure-results.outcome != 'success'
        run: |
          echo "::warning::Allure results artifact unavailable; skipping report generation and Vercel deploy."
          echo "Allure results artifact unavailable; report deploy skipped." >> "$GITHUB_STEP_SUMMARY"

      - name: Generate and brand Allure report
        if: steps.allure-results.outcome == 'success'
        run: npm run report:allure

      - name: Prepare static Vercel build output
        if: ${{ steps.allure-results.outcome == 'success' && env.VERCEL_DEPLOY_ENABLED == 'true' }}
        run: |
          output_dir="$RUNNER_TEMP/allure-vercel/.vercel/output"
          rm -rf "$RUNNER_TEMP/allure-vercel"
          mkdir -p "$output_dir/static"
          cp -R allure-report/. "$output_dir/static/"
          printf '%s\n' '{"version":3}' > "$output_dir/config.json"

      - name: Install Vercel CLI
        if: ${{ steps.allure-results.outcome == 'success' && env.VERCEL_DEPLOY_ENABLED == 'true' }}
        run: npm install --global vercel@latest

      - name: Deploy Allure report to Vercel (tests-openagreements)
        if: ${{ steps.allure-results.outcome == 'success' && env.VERCEL_DEPLOY_ENABLED == 'true' }}
        run: |
          cd "$RUNNER_TEMP/allure-vercel"
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  source-drift-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Build
        run: npm run build

      - name: Source drift canary (strict on main, permissive on PR)
        run: |
          if [ "${{ github.event_name }}" = "push" ] &&
             [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "Running strict source drift canary on main."
            node scripts/source_drift_canary.mjs --download --strict-missing
          else
            echo "Running permissive source drift canary on pull requests."
            node scripts/source_drift_canary.mjs --download
          fi
