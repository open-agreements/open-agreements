name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish (for example: v0.2.0)"
        required: true
        type: string

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    concurrency:
      group: npm-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Use npm 11.5.1+ for OIDC trusted publishing compatibility
        run: npm install --global npm@11.5.1

      - name: Verify tag matches release versions
        run: |
          TAG_REF="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          TAG_VERSION="${TAG_REF#v}"

          for pkg in package.json packages/contracts-workspace-mcp/package.json packages/contract-templates-mcp/package.json packages/checklist-mcp/package.json; do
            PKG_VERSION="$(node -p "require('./${pkg}').version")"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "Tag version ($TAG_VERSION) must match ${pkg} version ($PKG_VERSION)."
              exit 1
            fi
          done

          GEMINI_VERSION="$(node -p "require('./gemini-extension.json').version")"
          if [ "$TAG_VERSION" != "$GEMINI_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) must match gemini-extension.json version ($GEMINI_VERSION)."
            exit 1
          fi

          CURSOR_VERSION="$(node -p "require('./.cursor-plugin/plugin.json').version")"
          if [ "$TAG_VERSION" != "$CURSOR_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) must match .cursor-plugin/plugin.json version ($CURSOR_VERSION)."
            exit 1
          fi

          SERVER_VERSION="$(node -p "require('./server.json').version")"
          if [ "$TAG_VERSION" != "$SERVER_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) must match server.json version ($SERVER_VERSION)."
            exit 1
          fi

          SERVER_PKG_VERSION="$(node -p "require('./server.json').packages[0].version")"
          if [ "$TAG_VERSION" != "$SERVER_PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) must match server.json packages[0].version ($SERVER_PKG_VERSION)."
            exit 1
          fi

      - name: Verify version lockstep and MCP registry constraints
        run: node scripts/bump_version.mjs --check

      - name: Verify release commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Release tag commit is not contained in origin/main."
            exit 1
          fi

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Build publishable packages
        run: |
          npm run build
          npm run build:workspace-mcp
          npm run build:contract-templates-mcp
          npm run build:checklist-mcp

      - name: Validate templates
        run: npm run validate

      - name: Validate Gemini extension manifest contract
        run: npm run check:gemini-extension-manifest

      - name: Run tests
        run: npm run test:run

      - name: Isolated package runtime smoke checks
        run: npm run check:isolated-runtime

      - name: Verify package contents
        shell: bash
        run: |
          PACK_OUTPUT="$(npm pack --dry-run 2>&1)"
          echo "$PACK_OUTPUT"
          for required_file in gemini-extension.json AGENTS.md server.json; do
            if ! echo "$PACK_OUTPUT" | grep -q "$required_file"; then
              echo "FATAL: $required_file is missing from the npm tarball. Add it to the files array in package.json."
              exit 1
            fi
          done
          npm pack --dry-run --json | node -e '
            const data = JSON.parse(require("fs").readFileSync(0, "utf8"));
            const bundled = data[0].bundled || [];
            if (!bundled.includes("@usejunior/docx-core")) {
              console.error("FAIL: @usejunior/docx-core not in unscoped bundled list:", bundled);
              process.exit(1);
            }
            console.log("OK: unscoped open-agreements bundles @usejunior/docx-core");
          '
          (cd packages/contracts-workspace-mcp && npm pack --dry-run)
          (cd packages/contract-templates-mcp && npm pack --dry-run)
          (cd packages/checklist-mcp && npm pack --dry-run)
          SCOPED_DIR="$(mktemp -d)"
          cleanup_scoped_dir() {
            rm -rf "$SCOPED_DIR"
          }
          trap cleanup_scoped_dir EXIT
          node scripts/prepare_scoped_open_agreements_package.mjs --out-dir "$SCOPED_DIR"
          (cd "$SCOPED_DIR" && npm pack --dry-run)
          (cd "$SCOPED_DIR" && npm pack --dry-run --json) | node -e '
            const data = JSON.parse(require("fs").readFileSync(0, "utf8"));
            const bundled = data[0].bundled || [];
            if (!bundled.includes("@usejunior/docx-core")) {
              console.error("FAIL: @usejunior/docx-core not in scoped bundled list:", bundled);
              process.exit(1);
            }
            console.log("OK: scoped @open-agreements/open-agreements bundles @usejunior/docx-core");
          '
          trap - EXIT
          cleanup_scoped_dir

      - name: Guard against duplicate publish
        run: |
          TAG_REF="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          VERSION="${TAG_REF#v}"
          ALREADY=0
          TOTAL=0
          for pkg in open-agreements @open-agreements/open-agreements @open-agreements/contracts-workspace-mcp @open-agreements/contract-templates-mcp @open-agreements/checklist-mcp; do
            TOTAL=$((TOTAL + 1))
            if npm view "$pkg@$VERSION" version >/dev/null 2>&1; then
              echo "$pkg@$VERSION already published."
              ALREADY=$((ALREADY + 1))
            else
              echo "$pkg@$VERSION not yet published."
            fi
          done
          if [ "$ALREADY" -eq "$TOTAL" ]; then
            echo "All $TOTAL packages already published for $VERSION — nothing to do."
            exit 1
          fi
          echo "$ALREADY of $TOTAL packages already published — publish step will skip those."

  publish-suite:
    name: Publish package suite
    needs: [preflight]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    concurrency:
      group: npm-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Use npm 11.5.1+ for OIDC trusted publishing compatibility
        run: npm install --global npm@11.5.1

      - name: Install dependencies (retry)
        uses: ./.github/actions/npm-ci-retry

      - name: Build publishable packages
        run: |
          npm run build
          npm run build:workspace-mcp
          npm run build:contract-templates-mcp
          npm run build:checklist-mcp

      - name: Publish to npm (trusted publishing + provenance)
        shell: bash
        run: |
          TAG_REF="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          VERSION="${TAG_REF#v}"
          unset NODE_AUTH_TOKEN
          npm config delete //registry.npmjs.org/:_authToken || true

          # Publish unscoped open-agreements (skip if already published by a prior partial run)
          if npm view "open-agreements@$VERSION" version >/dev/null 2>&1; then
            echo "open-agreements@$VERSION already published — skipping."
          else
            npm pack --dry-run --json | node -e '
              const data = JSON.parse(require("fs").readFileSync(0, "utf8"));
              const bundled = data[0].bundled || [];
              if (!bundled.includes("@usejunior/docx-core")) {
                console.error("FAIL: @usejunior/docx-core not in unscoped bundled list:", bundled);
                process.exit(1);
              }
              console.log("OK: unscoped open-agreements bundles @usejunior/docx-core");
            '
            npm publish --provenance --access public
          fi

          # Publish @open-agreements/open-agreements scoped variant
          if npm view "@open-agreements/open-agreements@$VERSION" version >/dev/null 2>&1; then
            echo "@open-agreements/open-agreements@$VERSION already published — skipping."
          else
            SCOPED_DIR="$(mktemp -d)"
            cleanup_scoped_dir() {
              rm -rf "$SCOPED_DIR"
            }
            trap cleanup_scoped_dir EXIT
            node scripts/prepare_scoped_open_agreements_package.mjs --out-dir "$SCOPED_DIR"
            (cd "$SCOPED_DIR" && npm pack --dry-run --json) | node -e '
              const data = JSON.parse(require("fs").readFileSync(0, "utf8"));
              const bundled = data[0].bundled || [];
              if (!bundled.includes("@usejunior/docx-core")) {
                console.error("FAIL: @usejunior/docx-core not in scoped bundled list:", bundled);
                process.exit(1);
              }
              console.log("OK: scoped @open-agreements/open-agreements bundles @usejunior/docx-core");
            '
            echo "Publishing @open-agreements/open-agreements from $SCOPED_DIR"
            (cd "$SCOPED_DIR" && npm publish --provenance --access public)
            trap - EXIT
            cleanup_scoped_dir
          fi

          # Publish workspace MCP packages
          for entry in "@open-agreements/contracts-workspace-mcp:packages/contracts-workspace-mcp" "@open-agreements/contract-templates-mcp:packages/contract-templates-mcp" "@open-agreements/checklist-mcp:packages/checklist-mcp"; do
            PKG_NAME="${entry%%:*}"
            PKG_DIR="${entry##*:}"
            if npm view "$PKG_NAME@$VERSION" version >/dev/null 2>&1; then
              echo "$PKG_NAME@$VERSION already published — skipping."
            else
              echo "Publishing $PKG_NAME from $PKG_DIR"
              (cd "$PKG_DIR" && npm publish --provenance --access public)
            fi
          done

  # Keeps the official MCP registry (what VS Code's MCP gallery and the
  # aggregators index) in lockstep with npm. continue-on-error: a registry
  # outage must never block the npm release; preflight already validated
  # server.json's version pin and description cap.
  publish-mcp-registry:
    name: Publish to MCP Registry
    needs: [publish-suite]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Wait for npm propagation
        run: |
          TAG_REF="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          VERSION="${TAG_REF#v}"
          # The registry validates ownership by reading mcpName from the npm
          # package named in server.json — wait until the registry can see
          # the same bits we just published.
          for attempt in 1 2 3 4 5 6; do
            echo "npm propagation check attempt ${attempt}/6"
            RESULT="$(npm view "@open-agreements/contract-templates-mcp@${VERSION}" version mcpName --json 2>/dev/null || true)"
            PKG_VERSION="$(echo "$RESULT" | jq -r '.version // empty' 2>/dev/null)"
            PKG_MCP="$(echo "$RESULT" | jq -r '.mcpName // empty' 2>/dev/null)"
            if [ "$PKG_VERSION" = "$VERSION" ] && [ "$PKG_MCP" = "io.github.open-agreements/open-agreements" ]; then
              echo "@open-agreements/contract-templates-mcp@${VERSION} is available on npm with correct mcpName."
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              sleep $((attempt * 10))
            fi
          done
          echo "@open-agreements/contract-templates-mcp@${VERSION} not found on npm after 6 attempts (~150s)."
          exit 1

      - name: Download mcp-publisher
        run: |
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64)  ARCH="amd64" ;;
            aarch64) ARCH="arm64" ;;
          esac
          URL="https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz"
          echo "Downloading mcp-publisher from: $URL"
          curl -fsSL "$URL" | tar xz mcp-publisher
          chmod +x mcp-publisher
          pwd >> "$GITHUB_PATH"

      - name: Authenticate with GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: |
          for attempt in 1 2 3; do
            echo "mcp-publisher publish attempt ${attempt}/3"
            if mcp-publisher publish server.json; then
              echo "Published to MCP Registry successfully."
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 15))
            fi
          done
          echo "::warning::MCP Registry publish failed after 3 attempts. Manual publish may be required."
          exit 1

  publish-github-release:
    name: Publish GitHub release notes
    needs: [preflight, publish-suite]
    if: always() && needs.preflight.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Create GitHub release (only if publish succeeded)
        if: needs.publish-suite.result == 'success'
        id: release
        run: |
          TAG_REF="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          if gh release view "$TAG_REF" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "GitHub release already exists for ${TAG_REF}."
          else
            gh release create "$TAG_REF" --title "$TAG_REF" --generate-notes --verify-tag
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "Created GitHub release for ${TAG_REF}."
          fi

      - name: Publish release summary
        if: always()
        run: |
          TAG_REF="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          PUBLISH_RESULT="${{ needs.publish-suite.result }}"
          {
            echo "### GitHub Release: ${TAG_REF}"
            if [ "$PUBLISH_RESULT" = "success" ]; then
              RELEASE_URL="$(gh release view "$TAG_REF" --json url --jq '.url' 2>/dev/null || echo 'n/a')"
              echo "- npm publish: SUCCESS"
              echo "- Release created: ${{ steps.release.outputs.created || 'already existed' }}"
              echo "- Release URL: ${RELEASE_URL}"
            else
              echo "- npm publish: FAILED — GitHub Release was NOT created"
              echo "- To recover once the tag is corrected, run:"
              echo '  ```'
              echo "  gh release create ${TAG_REF} --title ${TAG_REF} --generate-notes --verify-tag --latest=false"
              echo '  ```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish-template-snapshot:
    name: Publish template snapshot tarball
    needs: [preflight, publish-suite, publish-github-release]
    if: needs.preflight.result == 'success' && needs.publish-suite.result == 'success' && needs.publish-github-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Build templates tarball
        id: build_tarball
        run: |
          TAG_REF="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          VERSION="${TAG_REF#v}"
          TARBALL="templates-${VERSION}.tar.gz"

          # Tarball contents track exactly what dev-website's consumer reads:
          # templates/<slug>/{metadata.yaml,template.docx}, data/templates-snapshot.json,
          # and scripts/template-specs/ (for label resolution). external is intentionally
          # excluded — dev-website does not consume the YC SAFE templates from this path.
          tar -czf "$TARBALL" \
            templates \
            data/templates-snapshot.json \
            scripts/template-specs

          SIZE_BYTES="$(stat -c%s "$TARBALL")"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "size_bytes=${SIZE_BYTES}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Hard cap at 10 MB to surface accidental binary creep early.
          if [ "$SIZE_BYTES" -gt 10485760 ]; then
            echo "Tarball exceeds 10 MB safety cap (size=${SIZE_BYTES}). Aborting." >&2
            exit 1
          fi

      - name: Upload tarball as release asset
        run: |
          TAG_REF="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          gh release upload "$TAG_REF" "${{ steps.build_tarball.outputs.tarball }}" --clobber

      - name: Snapshot summary
        if: always()
        run: |
          TAG_REF="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          TARBALL="${{ steps.build_tarball.outputs.tarball }}"
          SIZE_BYTES="${{ steps.build_tarball.outputs.size_bytes }}"
          {
            echo "### Template snapshot: ${TAG_REF}"
            echo "- Tarball: \`${TARBALL}\` (${SIZE_BYTES} bytes)"
          } >> "$GITHUB_STEP_SUMMARY"
